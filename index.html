<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TransportSys</title>
    
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- 💡 เชื่อมต่อ PWA ไฟล์ -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/709/709790.png">
    
    <script>
        window.addEventListener('error', function(e) { console.error("Global Error:", e.message); });
        
        // 💡 ลงทะเบียน Service Worker สำหรับ PWA (ดัก Error ให้แล้ว)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                if (window.location.protocol.startsWith('http') && !window.location.href.includes('blob:')) {
                    navigator.serviceWorker.register('./sw.js').catch(function(error) {
                        console.log('Service Worker สแตนด์บายพร้อมทำงาน:', error.message);
                    });
                }
            });
        }
    </script>

    <!-- Import Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        /* ซ่อนข้อความรบกวนในตัวสแกนกล้อง */
        #qr-reader__dashboard_section_csr span { display: none !important; }
        #qr-reader { border: none !important; }
        
        /* Animation สำหรับหน้า Install */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div style="padding: 20px; color: #666; text-align: center; font-family: sans-serif; margin-top: 20vh;">
            <div style="width: 40px; height: 40px; border: 4px solid #bfdbfe; border-top: 4px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px auto;"></div>
            <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
            กำลังเริ่มต้นระบบ...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, Component } = React;

        const API_URL = "https://script.google.com/macros/s/AKfycbxBp4lTwyZ21SOGZ2afHqM20apwhr8dyXW2N2RYP9BQxdZLO4vidHExR55cAJBqxpwgpA/exec"; 

        const callAPI = async (action, payload = {}) => {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, ...payload })
                });
                return await response.json();
            } catch (error) {
                console.error("API Error:", error);
                throw error;
            }
        };

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-4 bg-red-50 text-red-800 m-4 rounded-lg border border-red-200">
                            <h2 className="font-bold text-lg mb-2">⚠️ ระบบพบปัญหาในการแสดงผล</h2>
                            <p className="text-sm">{this.state.error && this.state.error.toString()}</p>
                            <button onClick={() => window.location.reload()} className="mt-4 bg-red-600 text-white px-4 py-2 rounded">รีเฟรชหน้าจอ</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- ICONS ---
        const SvgIcon = ({ children, size = 24, className = '', color = "currentColor", ...rest }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...rest}>{children}</svg>
        );
        const Truck = (p) => <SvgIcon {...p}><rect x="1" y="3" width="15" height="13" /><polygon points="16 8 20 8 23 11 23 16 16 16 16 8" /><circle cx="5.5" cy="18.5" r="2.5" /><circle cx="18.5" cy="18.5" r="2.5" /></SvgIcon>;
        const MapPin = (p) => <SvgIcon {...p}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></SvgIcon>;
        const Calendar = (p) => <SvgIcon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></SvgIcon>;
        const Clock = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></SvgIcon>;
        const User = (p) => <SvgIcon {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></SvgIcon>;
        const LogOut = (p) => <SvgIcon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></SvgIcon>;
        const PlusCircle = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="16" /><line x1="8" y1="12" x2="16" y2="12" /></SvgIcon>;
        const CheckCircle = (p) => <SvgIcon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></SvgIcon>;
        const AlertCircle = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></SvgIcon>;
        const Play = (p) => <SvgIcon {...p}><polygon points="5 3 19 12 5 21 5 3" /></SvgIcon>;
        const FileText = (p) => <SvgIcon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" /></SvgIcon>;
        const BarChart2 = (p) => <SvgIcon {...p}><line x1="18" y1="20" x2="18" y2="10" /><line x1="12" y1="20" x2="12" y2="4" /><line x1="6" y1="20" x2="6" y2="14" /></SvgIcon>;
        const Bell = (p) => <SvgIcon {...p}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 0 1-3.46 0" /></SvgIcon>;
        const Search = (p) => <SvgIcon {...p}><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></SvgIcon>;
        const Lock = (p) => <SvgIcon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></SvgIcon>;
        const Eye = (p) => <SvgIcon {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></SvgIcon>;
        const EyeOff = (p) => <SvgIcon {...p}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" /><line x1="1" y1="1" x2="23" y2="23" /></SvgIcon>;
        const UsersIcon = (p) => <SvgIcon {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></SvgIcon>;
        const Edit = (p) => <SvgIcon {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></SvgIcon>;
        const Trash2 = (p) => <SvgIcon {...p}><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></SvgIcon>;
        const Save = (p) => <SvgIcon {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2-2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></SvgIcon>;
        const X = (p) => <SvgIcon {...p}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></SvgIcon>;
        const ListIcon = (p) => <SvgIcon {...p}><line x1="8" y1="6" x2="21" y2="6" /><line x1="8" y1="12" x2="21" y2="12" /><line x1="8" y1="18" x2="21" y2="18" /><line x1="3" y1="6" x2="3.01" y2="6" /><line x1="3" y1="12" x2="3.01" y2="12" /><line x1="3" y1="18" x2="3.01" y2="18" /></SvgIcon>;
        const MapIcon = (p) => <SvgIcon {...p}><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" /><line x1="8" y1="2" x2="8" y2="18" /><line x1="16" y1="6" x2="16" y2="22" /></SvgIcon>;
        const CameraIcon = (p) => <SvgIcon {...p}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" /><circle cx="12" cy="13" r="4" /></SvgIcon>;
        const Camera = CameraIcon; 
        const QrCode = (p) => <SvgIcon {...p}><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><rect x="7" y="7" width="3" height="3" /><rect x="14" y="7" width="3" height="3" /><rect x="7" y="14" width="3" height="3" /><rect x="14" y="14" width="3" height="3" /></SvgIcon>;
        const PieChart = (p) => <SvgIcon {...p}><path d="M21.21 15.89A10 10 0 1 1 8 2.83" /><path d="M22 12A10 10 0 0 0 12 2v10z" /></SvgIcon>;
        const Download = (p) => <SvgIcon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></SvgIcon>;
        const Briefcase = (p) => <SvgIcon {...p}><rect x="2" y="7" width="20" height="14" rx="2" ry="2" /><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></SvgIcon>;
        const Share = (p) => <SvgIcon {...p}><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></SvgIcon>;
        const TrendingUp = (p) => <SvgIcon {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18" /><polyline points="17 6 23 6 23 12" /></SvgIcon>;

        // 💡 ชุดสีสันสำหรับกราฟ (Color Palette)
        const CHART_COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#6366f1', '#14b8a6', '#ef4444'];

        // 💡 คอมโพเนนต์สร้างกราฟ Pie & Donut แบบกำหนดเอง (เสถียร ไม่ต้องใช้ Library นอก)
        const SvgPieChart = ({ data, colors, isDonut }) => {
            const total = data.reduce((sum, d) => sum + d.value, 0);
            if (total === 0) return <div className="text-slate-400 text-center h-full flex items-center justify-center">ไม่มีข้อมูลในช่วงเวลานี้</div>;

            let cumulativePercent = 0;

            return (
                <div className="flex flex-col items-center justify-center h-full w-full">
                    <div className="relative w-48 h-48 mb-6 mt-4">
                        <svg viewBox="-1.2 -1.2 2.4 2.4" className="w-full h-full drop-shadow-md" style={{ transform: 'rotate(-90deg)' }}>
                            {data.map((slice, i) => {
                                const startPercent = cumulativePercent;
                                const slicePercent = slice.value / total;
                                const endPercent = cumulativePercent + slicePercent;
                                cumulativePercent = endPercent;

                                // กรณีข้อมูลมีแค่หมวดหมู่เดียว (100%)
                                if (slicePercent === 1) {
                                    return (
                                        <g key={i}>
                                            <circle cx="0" cy="0" r="1" fill={colors[i % colors.length]} />
                                            <text x="0" y="0" fill="#fff" fontSize="0.25" textAnchor="middle" dominantBaseline="central" fontWeight="bold" style={{ transform: 'rotate(90deg)' }}>
                                                {isDonut ? `${Math.round(slicePercent * 100)}%` : slice.value}
                                            </text>
                                        </g>
                                    );
                                }

                                const startX = Math.cos(2 * Math.PI * startPercent);
                                const startY = Math.sin(2 * Math.PI * startPercent);
                                const endX = Math.cos(2 * Math.PI * endPercent);
                                const endY = Math.sin(2 * Math.PI * endPercent);
                                const largeArcFlag = slicePercent > 0.5 ? 1 : 0;
                                
                                const pathData = [
                                    `M ${startX} ${startY}`,
                                    `A 1 1 0 ${largeArcFlag} 1 ${endX} ${endY}`,
                                    `L 0 0`,
                                ].join(' ');

                                // ตำแหน่งสำหรับวาง Data Label
                                const midPercent = startPercent + slicePercent / 2;
                                const labelRadius = isDonut ? 0.75 : 0.6; 
                                const labelX = Math.cos(2 * Math.PI * midPercent) * labelRadius;
                                const labelY = Math.sin(2 * Math.PI * midPercent) * labelRadius;

                                return (
                                    <g key={i} className="transition-all hover:opacity-80 cursor-pointer">
                                        <path d={pathData} fill={colors[i % colors.length]} stroke="white" strokeWidth="0.03" />
                                        {/* ซ่อน Label ถ้าค่าน้อยกว่า 5% ป้องกันข้อความทับกัน */}
                                        {slicePercent > 0.05 && (
                                            <text x={labelX} y={labelY} fill="#fff" fontSize="0.2" textAnchor="middle" dominantBaseline="central" fontWeight="bold" style={{ transform: 'rotate(90deg)', transformOrigin: `${labelX}px ${labelY}px` }}>
                                                {isDonut ? `${Math.round(slicePercent * 100)}%` : slice.value}
                                            </text>
                                        )}
                                    </g>
                                );
                            })}
                            
                            {/* เจาะรูตรงกลางสำหรับกราฟ Donut */}
                            {isDonut && <circle cx="0" cy="0" r="0.5" fill="white" />}
                            {isDonut && (
                                <text x="0" y="0" fill="#333" fontSize="0.25" textAnchor="middle" dominantBaseline="central" fontWeight="bold" style={{ transform: 'rotate(90deg)' }}>
                                    {total}
                                </text>
                            )}
                        </svg>
                    </div>
                    {/* คำอธิบาย (Legend) ด้านล่างกราฟ */}
                    <div className="flex flex-wrap justify-center gap-2 text-xs w-full px-2">
                        {data.map((d, i) => (
                            <div key={i} className="flex items-center gap-1.5 bg-slate-50 px-2.5 py-1 rounded-md border border-slate-200">
                                <span className="w-3 h-3 rounded-full shadow-sm" style={{ backgroundColor: colors[i % colors.length] }}></span>
                                <span className="text-slate-700 font-medium">{d.name} <span className="text-slate-400">({d.value})</span></span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // 💡 สูตรแปลงเวลาจาก ID เพื่อให้แสดงได้ตรงเป๊ะ (ดัก Error เวลากรณีไม่เข้าเงื่อนไข)
        const formatTimeHelper = (isoString, reqId) => {
            if (reqId && !isNaN(Number(reqId)) && Number(reqId) > 1600000000000) {
                return new Date(Number(reqId)).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            }
            if (!isoString) return '';
            try {
                const d = new Date(isoString);
                return isNaN(d.getTime()) ? '' : d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            } catch (e) { return ''; }
        };

        const Card = ({ children, className = '' }) => (<div className={`bg-white rounded-xl shadow-sm border border-slate-200 p-6 ${className}`}>{children}</div>);
        const StatusBadge = ({ status }) => {
            const styles = { pending: 'bg-yellow-100 text-yellow-800', assigned: 'bg-blue-100 text-blue-800', in_progress: 'bg-indigo-100 text-indigo-800', completed: 'bg-green-100 text-green-800', cancelled: 'bg-red-100 text-red-800' };
            const labels = { pending: 'รอคนรับงาน', assigned: 'มีคนรับแล้ว', in_progress: 'กำลังดำเนินการ', completed: 'เสร็จสิ้น', cancelled: 'ยกเลิก' };
            return (<span className={`px-3 py-1 rounded-full text-xs font-semibold ${styles[status] || 'bg-gray-100'}`}>{labels[status] || status}</span>);
        };

        // ==========================================
        // 🚀 หน้าต่าง Install App (PWA)
        // ==========================================
        const InstallScreen = ({ onSkip }) => {
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [showIosInstruction, setShowIosInstruction] = useState(false);
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                });
            }, []);

            const handleInstallClick = async () => {
                if (isIOS) {
                    setShowIosInstruction(true);
                } else if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        onSkip();
                    }
                    setDeferredPrompt(null);
                } else {
                    onSkip();
                }
            };

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4">
                    <div className="w-full max-w-sm bg-white rounded-2xl shadow-xl overflow-hidden animate-in fade-in zoom-in duration-500 relative">
                        <div className="pt-10 pb-6 flex flex-col items-center bg-gradient-to-b from-blue-50 to-white relative">
                            <button onClick={onSkip} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600 font-medium text-sm">ข้าม</button>
                            <img src="https://cdn-icons-png.flaticon.com/512/709/709790.png" alt="App Mascot" className="w-40 h-40 object-contain drop-shadow-lg animate-float" />
                        </div>
                        <div className="px-6 pb-10 text-center">
                            <h1 className="text-2xl font-bold text-slate-800 mb-2 leading-tight">Transport<br/>Management App</h1>
                            <button onClick={handleInstallClick} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-lg py-3.5 rounded-xl shadow-[0_4px_14px_0_rgba(37,99,235,0.39)] transition-all active:scale-95 mt-6 mb-4">Install</button>
                            <p className="text-slate-500 text-sm">We'll also create a shortcut</p>
                        </div>
                        {showIosInstruction && (
                            <div className="absolute inset-0 bg-black/80 flex items-center justify-center p-6 z-50 animate-in fade-in">
                                <div className="bg-white p-6 rounded-2xl text-center w-full relative">
                                    <button onClick={() => setShowIosInstruction(false)} className="absolute top-3 right-3 text-slate-400"><X size={20}/></button>
                                    <h3 className="font-bold text-lg mb-4 text-slate-800">วิธีการติดตั้งบน iPhone</h3>
                                    <div className="text-left text-slate-600 space-y-4 text-sm">
                                        <p className="flex items-center gap-3"><span className="bg-blue-100 text-blue-600 p-2 rounded-lg"><Share size={18}/></span> <b>1.</b> แตะไอคอนแชร์ที่เมนูด้านล่าง</p>
                                        <p className="flex items-center gap-3"><span className="bg-blue-100 text-blue-600 p-2 rounded-lg"><PlusCircle size={18}/></span> <b>2.</b> เลือก "เพิ่มไปยังหน้าจอโฮม"</p>
                                        <p className="flex items-center gap-3"><span className="bg-blue-100 text-blue-600 p-2 rounded-lg"><CheckCircle size={18}/></span> <b>3.</b> แตะ "เพิ่ม" ที่มุมขวาบน</p>
                                    </div>
                                    <button onClick={onSkip} className="mt-6 w-full py-3 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200">เข้าใช้งานผ่านเว็บแทน</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- COMPONENTS ---

        // 💡 ระบบกล้อง Live Scanner (มีหน้าให้ระบุจำนวนพาเลท)
        const QRScannerModal = ({ isOpen, onClose, onScanSuccess, expectedLocation }) => {
            const [error, setError] = useState('');
            const [step, setStep] = useState('scan'); 
            const [pallets, setPallets] = useState('');
            const scannerRef = useRef(null);

            useEffect(() => { 
                if (isOpen) {
                    setError('');
                    setStep('scan'); 
                    setPallets(''); 
                }
            }, [isOpen]);

            useEffect(() => {
                if (isOpen && step === 'scan') {
                    setTimeout(() => {
                        const html5QrCode = new window.Html5Qrcode("qr-reader");
                        scannerRef.current = html5QrCode;

                        html5QrCode.start(
                            { facingMode: "environment" },
                            { fps: 10, qrbox: { width: 250, height: 250 } },
                            (decodedText) => {
                                if (decodedText === expectedLocation || decodedText.includes(expectedLocation)) {
                                    if (scannerRef.current) {
                                        scannerRef.current.stop().then(() => {
                                            scannerRef.current.clear();
                                            setStep('input_pallets'); // ไปหน้ากรอกพาเลท
                                        }).catch(err => console.error(err));
                                    }
                                } else {
                                    setError(`❌ สแกนผิดจุด!\nระบบต้องการป้าย: "${expectedLocation}"`);
                                }
                            },
                            (errorMessage) => { }
                        ).catch((err) => {
                            setError("❌ ไม่สามารถเปิดกล้องได้ กรุณาตรวจสอบสิทธิ์กล้อง (Camera Permission)");
                        });
                    }, 100);
                }

                return () => {
                    if (scannerRef.current && scannerRef.current.isScanning) {
                        scannerRef.current.stop().then(() => scannerRef.current.clear()).catch(console.error);
                    }
                };
            }, [isOpen, step, expectedLocation]);

            const handleConfirmPallets = () => {
                if (pallets === '' || Number(pallets) < 0) {
                    setError('กรุณาระบุจำนวนพาเลทให้ถูกต้อง');
                    return;
                }
                setError('');
                setStep('success'); 
                setTimeout(() => onScanSuccess(Number(pallets)), 1000);
            };

            const handleCloseModal = () => {
                if (scannerRef.current && scannerRef.current.isScanning) {
                    scannerRef.current.stop().then(() => {
                        scannerRef.current.clear();
                        onClose();
                    }).catch(() => onClose());
                } else {
                    onClose();
                }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-[#0B1121] bg-opacity-95 z-50 flex flex-col items-center justify-center p-4 animate-in fade-in duration-200">
                    <div className="w-full max-w-sm bg-[#1A2235] rounded-2xl overflow-hidden relative border border-slate-700 shadow-2xl flex flex-col">
                        <div className="p-4 flex justify-between items-center z-10 border-b border-slate-700/50">
                            <span className="text-white font-semibold flex items-center gap-2">
                                <CameraIcon size={20} className="text-blue-400"/> สแกน QR Code เพื่อจบงาน
                            </span>
                            <button onClick={handleCloseModal} className="text-slate-400 hover:text-white p-1 rounded-full transition-colors"><X size={24} /></button>
                        </div>

                        <div className="relative flex flex-col items-center justify-center pt-8 pb-8 px-6 flex-1 min-h-[350px]">
                            
                            <div className={`w-full flex-col items-center ${step === 'scan' ? 'flex' : 'hidden'}`}>
                                <div id="qr-reader" className="w-full max-w-sm rounded-xl overflow-hidden mb-4 border border-slate-700 bg-black min-h-[250px]"></div>
                                <p className="text-slate-400 text-sm mb-1">จุดส่งสินค้าที่คุณต้องสแกนคือ:</p>
                                <h3 className="text-blue-400 font-bold text-3xl tracking-wide">{expectedLocation}</h3>
                            </div>

                            {step === 'success' && (
                                <div className="flex flex-col items-center animate-in zoom-in duration-300">
                                    <div className="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-4 shadow-[0_0_30px_rgba(34,197,94,0.4)]">
                                        <CheckCircle size={40} color="white" />
                                    </div>
                                    <h3 className="text-white font-bold text-xl">บันทึกสำเร็จ!</h3>
                                    <p className="text-green-400 text-sm mt-1">กำลังบันทึกข้อมูลและปิดงาน...</p>
                                </div>
                            )}

                            {step === 'input_pallets' && (
                                <div className="w-full flex flex-col items-center animate-in slide-in-from-right-4 duration-300">
                                    <div className="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center mb-4">
                                        <CheckCircle size={32} className="text-blue-400" />
                                    </div>
                                    <h3 className="text-white font-bold text-2xl mb-2">ระบุจำนวนพาเลท</h3>
                                    <p className="text-slate-400 text-sm mb-6 text-center">คุณรับสินค้ามาทั้งหมดกี่พาเลทในเที่ยวนี้?</p>
                                    
                                    <input 
                                        type="number" 
                                        min="0"
                                        value={pallets}
                                        onChange={(e) => setPallets(e.target.value)}
                                        className="w-32 text-center text-4xl font-bold bg-[#0B1121] text-white border-2 border-slate-600 rounded-2xl py-4 outline-none focus:border-blue-500 mb-6 transition-colors"
                                        placeholder="0"
                                        autoFocus
                                    />
                                    <button 
                                        onClick={handleConfirmPallets}
                                        className="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-bold text-lg shadow-[0_4px_20px_0_rgba(37,99,235,0.4)] flex items-center justify-center gap-2 transition-all active:scale-95"
                                    >
                                        <Save size={20} />
                                        ยืนยันและจบงาน
                                    </button>
                                </div>
                            )}

                            {error && step === 'scan' && (
                                <div className="mt-6 w-full bg-red-900/50 text-red-200 p-3 rounded-xl border border-red-800 text-sm text-center animate-in slide-in-from-bottom-2">
                                    <span className="leading-relaxed whitespace-pre-line">{error}</span>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const LoginScreen = ({ users, onLogin, refreshData }) => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [isResetMode, setIsResetMode] = useState(false);
            const [resetUsername, setResetUsername] = useState('');
            const [oldPassword, setOldPassword] = useState(''); 
            const [newPassword, setNewPassword] = useState('');
            const [isResetting, setIsResetting] = useState(false);
            const [resetMsg, setResetMsg] = useState({ type: '', text: '' });

            const handleLogin = (e) => {
                e.preventDefault();
                if (!users || users.length === 0) {
                    setError('กำลังโหลดข้อมูล Database กรุณารอสักครู่'); return;
                }
                const user = users.find(u => String(u.username) === String(username) && String(u.password) === String(password));
                if (user) { setError(''); onLogin(user); } else { setError('ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง'); }
            };

            const handleResetPassword = (e) => {
                e.preventDefault();
                const userValid = users.find(u => String(u.username) === String(resetUsername) && String(u.password) === String(oldPassword));
                if (!userValid) { setResetMsg({ type: 'error', text: 'ชื่อผู้ใช้งานหรือรหัสผ่านเดิมไม่ถูกต้อง' }); return; }

                setIsResetting(true);
                setResetMsg({ type: 'info', text: 'กำลังดำเนินการ...' });
                
                callAPI('resetUserPassword', { username: resetUsername, newPassword })
                    .then(res => {
                        setIsResetting(false);
                        if (res && res.success) {
                            setResetMsg({ type: 'success', text: 'เปลี่ยนรหัสผ่านสำเร็จ' });
                            refreshData();
                            setTimeout(() => { setIsResetMode(false); setResetMsg({ type: '', text: '' }); setResetUsername(''); setOldPassword(''); setNewPassword(''); }, 2500);
                        } else {
                            setResetMsg({ type: 'error', text: res ? res.message : 'เกิดข้อผิดพลาด' });
                        }
                    })
                    .catch(err => {
                        setIsResetting(false);
                        setResetMsg({ type: 'error', text: 'เกิดข้อผิดพลาดในการเชื่อมต่อ API' });
                    });
            };

            if (isResetMode) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <Card className="w-full max-w-md space-y-6">
                            <div className="text-center">
                                <div className="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><Lock size={32} className="text-blue-600"/></div>
                                <h1 className="text-2xl font-bold text-slate-800">เปลี่ยนรหัสผ่าน</h1>
                                <p className="text-slate-500 text-sm mt-1">กรุณากรอกข้อมูลเพื่อยืนยันตัวตนและตั้งรหัสผ่านใหม่</p>
                            </div>
                            <form onSubmit={handleResetPassword} className="space-y-4">
                                {resetMsg.text && (
                                    <div className={`p-3 text-sm rounded-lg flex items-center gap-2 ${resetMsg.type === 'success' ? 'bg-green-50 text-green-700 border border-green-200' : resetMsg.type === 'error' ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-blue-50 text-blue-600 border border-blue-200'}`}>
                                        {resetMsg.type === 'success' ? <CheckCircle size={16}/> : resetMsg.type === 'error' ? <AlertCircle size={16}/> : <Clock size={16}/>} {resetMsg.text}
                                    </div>
                                )}
                                <div className="space-y-1"><label className="text-sm font-medium text-slate-700">ชื่อผู้ใช้งาน</label><input type="text" value={resetUsername} onChange={(e) => setResetUsername(e.target.value)} className="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required disabled={isResetting} /></div>
                                <div className="space-y-1"><label className="text-sm font-medium text-slate-700">รหัสผ่านเดิม</label><input type="password" value={oldPassword} onChange={(e) => setOldPassword(e.target.value)} className="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required disabled={isResetting} /></div>
                                <div className="space-y-1"><label className="text-sm font-medium text-slate-700">รหัสผ่านใหม่</label><input type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} className="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required disabled={isResetting} minLength="3" /></div>
                                <button type="submit" className="w-full bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 font-medium shadow-sm mt-2 flex justify-center items-center gap-2" disabled={isResetting}>{isResetting ? <span className="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span> : <Save size={18}/>} ยืนยัน</button>
                                <button type="button" onClick={() => { setIsResetMode(false); setResetMsg({ type: '', text: '' }); }} className="w-full bg-slate-100 text-slate-600 py-2.5 rounded-lg hover:bg-slate-200 font-medium mt-2" disabled={isResetting}>ยกเลิก</button>
                            </form>
                        </Card>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                    <Card className="w-full max-w-md space-y-8">
                        <div className="text-center">
                            <div className="bg-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><Truck size={32} color="white"/></div>
                            <h1 className="text-2xl font-bold text-slate-800">เข้าสู่ระบบ</h1>
                            <p className="text-slate-500 text-sm mt-1">ระบบเรียกรถขนส่ง</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4">
                            {error && <div className="p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg flex items-center gap-2"><AlertCircle size={16} />{error}</div>}
                            <div className="space-y-1">
                                <label className="text-sm font-medium text-slate-700">ชื่อผู้ใช้งาน</label>
                                <div className="relative">
                                    <div className="absolute left-3 top-2.5 text-slate-400"><User size={18} /></div>
                                    <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full pl-10 pr-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required />
                                </div>
                            </div>
                            <div className="space-y-1">
                                <label className="text-sm font-medium text-slate-700">รหัสผ่าน</label>
                                <div className="relative">
                                    <div className="absolute left-3 top-2.5 text-slate-400"><Lock size={18} /></div>
                                    <input type={showPassword ? "text" : "password"} value={password} onChange={(e) => setPassword(e.target.value)} className="w-full pl-10 pr-10 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-2.5 text-slate-400 hover:text-slate-600"><EyeOff size={18} /></button>
                                </div>
                            </div>
                            <button type="submit" className="w-full bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 font-medium shadow-sm mt-2" disabled={!users || users.length === 0}>
                                {(!users || users.length === 0) ? 'กำลังเชื่อมต่อ Database...' : 'เข้าสู่ระบบ'}
                            </button>
                            <div className="text-center pt-2"><button type="button" onClick={() => setIsResetMode(true)} className="text-sm text-blue-600 hover:text-blue-800 hover:underline">เปลี่ยนรหัสผ่าน?</button></div>
                        </form>
                    </Card>
                </div>
            );
        };

        const RequesterDashboard = ({ requests, onCreateRequest, currentUserId, currentUser, locations }) => {
            const [showForm, setShowForm] = useState(false);
            const [formData, setFormData] = useState({ pickup: '', dropoff: '', date: '', tripsNeeded: 1, pallets: '', note: '' });

            useEffect(() => {
                if (locations.length > 0 && !formData.pickup) {
                    setFormData(prev => ({...prev, pickup: locations[0]?.name||'', dropoff: locations[1]?.name||locations[0]?.name||''}));
                }
            }, [locations]);

            const handleSubmit = (e) => { 
                e.preventDefault(); 
                onCreateRequest(formData); 
                setShowForm(false); 
                setFormData({ ...formData, note: '', pallets: '' }); 
            };
            
            const myRequests = (requests || []).filter(r => 
                r && (String(r.requesterId) === String(currentUserId) || String(r.requesterName) === String(currentUser.name)) && r.status !== 'completed'
            );
            
            const today = new Date().toISOString().split('T')[0];

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center"><h2 className="text-xl font-bold">รายการคำขอของฉัน</h2><button onClick={() => setShowForm(!showForm)} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-2"><PlusCircle size={16}/> สร้างคำขอ</button></div>
                    {showForm && (
                        <Card><form onSubmit={handleSubmit} className="space-y-4">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label className="text-sm font-medium text-slate-600">รับ</label><select required className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mt-1" value={formData.pickup} onChange={e=>setFormData({...formData, pickup: e.target.value})}>{locations.map(l=><option key={l.id}>{l.name}</option>)}</select></div>
                                <div><label className="text-sm font-medium text-slate-600">ส่ง</label><select required className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mt-1" value={formData.dropoff} onChange={e=>setFormData({...formData, dropoff: e.target.value})}>{locations.map(l=><option key={l.id}>{l.name}</option>)}</select></div>
                                <div><label className="text-sm font-medium text-slate-600">วันที่</label><input required type="date" min={today} className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mt-1" value={formData.date} onChange={e=>setFormData({...formData, date: e.target.value})} /></div>
                                
                                <div className="flex gap-4">
                                    <div className="flex-1"><label className="text-sm font-medium text-slate-600">จำนวนเที่ยว</label><input required type="number" min="1" max="10" className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mt-1" value={formData.tripsNeeded} onChange={e=>setFormData({...formData, tripsNeeded: parseInt(e.target.value)})} /></div>
                                    <div className="flex-1"><label className="text-sm font-medium text-slate-600">จำนวนพาเลท</label><input required type="number" min="1" className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mt-1" value={formData.pallets} onChange={e=>setFormData({...formData, pallets: parseInt(e.target.value) || ''})} placeholder="ระบุจำนวน" /></div>
                                </div>
                            </div>
                            <div className="mt-4">
                                <label className="text-sm font-medium text-slate-600">หมายเหตุ (ระบุเพิ่มเติม)</label>
                                <input type="text" className="w-full p-2 border rounded-lg mt-1 outline-none focus:ring-2 focus:ring-blue-500" value={formData.note} onChange={e=>setFormData({...formData, note: e.target.value})} placeholder="เช่น ติดต่อคุณ A, ระวังสินค้าแตกหัก" />
                            </div>
                            <div className="flex justify-end gap-2 mt-4"><button type="button" onClick={()=>setShowForm(false)} className="px-4 py-2 text-slate-500">ยกเลิก</button><button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg">ยืนยัน</button></div>
                        </form></Card>
                    )}
                    <div className="grid gap-4">
                        {myRequests.length === 0 ? (
                            <div className="text-center py-10 text-slate-400 bg-transparent border-2 border-dashed border-slate-200 rounded-lg">ไม่มีรายการคำขอค้างอยู่</div>
                        ) : myRequests.map(req => (<Card key={req.id}><div className="flex justify-between"><div><StatusBadge status={req.status}/><div className="font-bold mt-2 text-slate-700 flex items-center gap-1"><MapPin size={16} className="text-blue-500"/> {req.pickup} <span className="text-slate-400">→</span> <MapPin size={16} className="text-green-500"/> {req.dropoff}</div>
                        <div className="text-sm text-slate-500 mt-1 flex items-center gap-1"><Calendar size={14}/> {req.date} {formatTimeHelper(req.createdAt, req.id)} น. • สำเร็จ {req.tripsCompleted}/{req.tripsNeeded} เที่ยว</div>
                        {req.pallets > 0 && <div className="text-sm text-slate-600 mt-1 font-medium">จำนวน: {req.pallets} พาเลท</div>}
                        {req.note && <div className="text-sm text-amber-600 mt-1 font-medium">หมายเหตุ: {req.note}</div>}
                        </div></div></Card>))}
                    </div>
                </div>
            );
        };

        const DriverDashboard = ({ requests, currentUser, onAcceptTrip, onUpdateTripStatus }) => {
            const [activeTab, setActiveTab] = useState('my-jobs');
            const [showScanner, setShowScanner] = useState(false);
            const [scanData, setScanData] = useState({ reqId: null, tripId: null, targetLocation: '' });
            
            // 💡 เพิ่ม State เพื่อเช็คว่าเบราว์เซอร์นี้เปิดแจ้งเตือนหรือยัง
            const [permStatus, setPermStatus] = useState(typeof Notification !== 'undefined' ? Notification.permission : 'denied');

            const availableRequests = (requests || []).filter(r => r && r.status !== 'completed' && r.trips && r.trips.some(t => !t.driverId));
            const myRequests = (requests || []).filter(r => r && r.status !== 'completed' && r.trips && r.trips.some(t => String(t.driverId) === String(currentUser.id) && t.status !== 'finished') && r.status !== 'cancelled');

            const handleScanSuccess = (pallets) => {
                if (scanData.reqId && scanData.tripId) {
                    onUpdateTripStatus(scanData.reqId, scanData.tripId, 'end', pallets);
                    setShowScanner(false);
                    setScanData({ reqId: null, tripId: null, targetLocation: '' });
                }
            };
            
            // 💡 ฟังก์ชันขอกดเปิดแจ้งเตือนด้วยตัวเอง (บังคับโดย User)
            const requestNotifyPerm = () => {
                if ('Notification' in window) {
                    Notification.requestPermission().then(status => {
                        setPermStatus(status);
                        if (status === 'granted') alert('✅ เปิดการแจ้งเตือนสำเร็จ!');
                        else alert('❌ ไม่สามารถเปิดแจ้งเตือนได้ (กรุณาตรวจสอบการตั้งค่าเบราว์เซอร์/มือถือของคุณ)');
                    });
                }
            };

            return (
                <div className="space-y-6">
                    <QRScannerModal isOpen={showScanner} onClose={() => setShowScanner(false)} onScanSuccess={handleScanSuccess} expectedLocation={scanData.targetLocation} />
                    
                    {/* 💡 แจ้งเตือนให้คนขับกดปุ่มเปิด Notification เพื่อป้องกันเบราว์เซอร์บล็อก */}
                    {permStatus !== 'granted' && (
                        <div className="bg-blue-50 border border-blue-200 p-3 rounded-xl flex justify-between items-center shadow-sm animate-in fade-in">
                            <div className="flex items-center gap-2 text-blue-800 text-sm font-medium">
                                <Bell className="animate-bounce" size={18} /> เปิดรับการแจ้งเตือนเมื่อมีงานใหม่
                            </div>
                            <button onClick={requestNotifyPerm} className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">
                                อนุญาต
                            </button>
                        </div>
                    )}
                    
                    <div className="bg-slate-100 p-1 rounded-lg flex gap-1 w-full md:w-max relative">
                        <button onClick={() => setActiveTab('my-jobs')} className={`px-4 py-2 rounded text-sm w-1/2 md:w-auto flex items-center justify-center gap-2 ${activeTab==='my-jobs'?'bg-white shadow text-blue-600':'text-slate-600'}`}><Briefcase size={16}/> งานของฉัน</button>
                        <button onClick={() => setActiveTab('pool')} className={`px-4 py-2 rounded text-sm w-1/2 md:w-auto flex items-center justify-center gap-2 relative ${activeTab==='pool'?'bg-white shadow text-blue-600':'text-slate-600'}`}>
                            <Bell size={16}/> งานว่าง 
                            {availableRequests.length > 0 && (
