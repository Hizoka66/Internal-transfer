        const AdminDashboard = ({ requests, setRequests, users, setUsers, locations, setLocations, onCreateRequest, onRefresh }) => {
            const [activeTab, setActiveTab] = useState('stats');
            const [filterType, setFilterType] = useState('daily'); 
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));
            const [startDate, setStartDate] = useState(''); 
            const [endDate, setEndDate] = useState('');     
            const [selectedDriver, setSelectedDriver] = useState('all');

            const driverUsers = users.filter(u => u.role === 'driver').map(u => u.name);
            const getDriverColor = (name) => {
                const idx = driverUsers.indexOf(name);
                return CHART_COLORS[idx >= 0 ? idx % CHART_COLORS.length : 0] || '#94a3b8';
            };

            const filteredRequests = useMemo(() => {
                return (requests||[]).filter(req => {
                    if (!req) return false;
                    const hasValidTrip = (req.trips || []).some(trip => {
                        if (selectedDriver !== 'all' && String(trip.driverId) !== String(selectedDriver)) return false;
                        const tDate = trip.date || req.date;
                        if (filterType === 'daily') return tDate === selectedDate;
                        if (filterType === 'monthly') return tDate && tDate.startsWith(selectedMonth);
                        if (filterType === 'range') { 
                            if (!startDate || !endDate) return true; 
                            return tDate >= startDate && tDate <= endDate;
                        }
                        return true;
                    });
                    return hasValidTrip;
                });
            }, [requests, filterType, selectedDate, selectedMonth, startDate, endDate, selectedDriver]);

            let totalTrips = 0, completedTrips = 0, pendingTrips = 0, activeTrips = 0;

            filteredRequests.forEach(req => {
                if (req && req.trips) {
                    req.trips.forEach(trip => {
                        const tDate = trip.date || req.date;
                        if (selectedDriver !== 'all' && String(trip.driverId) !== String(selectedDriver)) return;
                        if (filterType === 'daily' && tDate !== selectedDate) return;
                        if (filterType === 'monthly' && (!tDate || !tDate.startsWith(selectedMonth))) return;
                        if (filterType === 'range' && startDate && endDate && (tDate < startDate || tDate > endDate)) return;
                        
                        totalTrips++;
                        if (trip.status === 'finished') completedTrips++;
                        else if (trip.status === 'ongoing') activeTrips++;
                        else pendingTrips++;
                    });
                }
            });

            const chart1Data = useMemo(() => {
                if (filterType === 'monthly') {
                    const year = selectedMonth.split('-')[0] || new Date().getFullYear().toString();
                    const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
                    const monthData = months.map(m => ({ label: m, total: 0, drivers: {} }));
                    
                    (requests||[]).forEach(req => {
                        (req.trips || []).forEach(trip => {
                            const tDate = trip.date || req.date;
                            if (selectedDriver !== 'all' && String(trip.driverId) !== String(selectedDriver)) return;
                            
                            if (tDate && tDate.startsWith(year) && trip.status === 'finished') {
                                const mIndex = parseInt(tDate.split('-')[1]) - 1;
                                monthData[mIndex].total += 1;
                                const dName = trip.driverName || 'Admin';
                                if (!monthData[mIndex].drivers[dName]) monthData[mIndex].drivers[dName] = 0;
                                monthData[mIndex].drivers[dName] += 1;
                            }
                        });
                    });
                    return { type: 'monthly', data: monthData };
                } else {
                    let start, end;
                    const today = new Date();
                    if (filterType === 'range' && startDate && endDate) {
                        start = new Date(startDate); end = new Date(endDate);
                    } else { 
                        start = new Date(selectedDate); end = new Date(selectedDate);
                    }
                    
                    const dateMap = {};
                    const dateArray = [];
                    const curr = new Date(start);
                    
                    if (curr > end || isNaN(curr.getTime())) {
                        const str = today.toISOString().split('T')[0];
                        dateMap[str] = { label: `${today.getDate()}/${today.getMonth() + 1}`, total: 0, drivers: {} };
                        dateArray.push(str);
                    } else {
                        while (curr <= end) {
                            const str = curr.toISOString().split('T')[0];
                            dateMap[str] = { label: `${curr.getDate()}/${curr.getMonth() + 1}`, total: 0, drivers: {} };
                            dateArray.push(str);
                            curr.setDate(curr.getDate() + 1);
                        }
                    }
                    
                    (requests||[]).forEach(req => {
                        (req.trips || []).forEach(trip => {
                            const tDate = trip.date || req.date;
                            if (selectedDriver !== 'all' && String(trip.driverId) !== String(selectedDriver)) return;
                            
                            if (trip.status === 'finished' && dateMap[tDate]) {
                                dateMap[tDate].total += 1;
                                const dName = trip.driverName || 'Admin';
                                if (!dateMap[tDate].drivers[dName]) dateMap[tDate].drivers[dName] = 0;
                                dateMap[tDate].drivers[dName] += 1;
                            }
                        });
                    });
                    return { type: 'daily', data: dateArray.map(d => dateMap[d]) };
                }
            }, [requests, filterType, selectedMonth, selectedDate, startDate, endDate, selectedDriver]);

            const maxChart1Scale = Math.max(...chart1Data.data.map(d => d.total), 1);

            const validTripsList = useMemo(() => {
                let trips = [];
                filteredRequests.forEach(req => {
                    (req.trips || []).forEach(trip => {
                        if (selectedDriver !== 'all' && String(trip.driverId) !== String(selectedDriver)) return;
                        trips.push({ ...trip, reqDropoff: req.dropoff, requesterName: req.requesterName });
                    });
                });
                return trips;
            }, [filteredRequests, selectedDriver]);

            const locationVolume = useMemo(() => {
                const locMap = {};
                validTripsList.forEach(t => {
                    if (t.status === 'finished') {
                        if (!locMap[t.reqDropoff]) locMap[t.reqDropoff] = 0;
                        locMap[t.reqDropoff] += 1;
                    }
                });
                return Object.keys(locMap).map(name => ({ name, count: locMap[name] })).sort((a,b) => b.count - a.count);
            }, [validTripsList]);

            const maxVolumeLoc = Math.max(...locationVolume.map(d => d.count), 1);

            const requesterData = useMemo(() => {
                const reqMap = {};
                validTripsList.forEach(t => {
                    if (!reqMap[t.requesterName]) reqMap[t.requesterName] = 0;
                    reqMap[t.requesterName] += 1;
                });
                return Object.keys(reqMap).map(name => ({ name, value: reqMap[name] })).sort((a,b) => b.value - a.value);
            }, [validTripsList]);

            const completionData = [
                { name: 'สำเร็จ', value: completedTrips },
                { name: 'ค้าง/กำลังทำ', value: pendingTrips + activeTrips }
            ].filter(d => d.value > 0);

            const handleExport = () => {
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + "ID,Requester,Pickup,Dropoff,Status,Date,Pallets,Trips\n" + filteredRequests.map(r => `${r.id},${r.requesterName},${r.pickup},${r.dropoff},${r.status},${r.date},${r.pallets || 0},${r.tripsNeeded}`).join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `transport_data_${filterType}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const handleExportTrips = () => {
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + "Trip ID,Date,Pickup,Dropoff,Driver,Start Time,End Time,Pallets\n" 
                    + validTripsList.map(t => `${t.id},${t.reqDate},"${t.pickup}","${t.reqDropoff}","${t.driverName || ''}",${t.startTime || ''},${t.endTime || ''},${t.pallets || 0}`).join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `completed_trips_data.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            return (
                <div className="space-y-6">
                    <div className="flex gap-2 overflow-x-auto pb-2 border-b scrollbar-hide">
                        <button onClick={() => setActiveTab('stats')} className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap flex items-center gap-2 ${activeTab === 'stats' ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-100'}`}><BarChart2 size={16} /> ภาพรวม</button>
                        <button onClick={() => setActiveTab('users')} className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap flex items-center gap-2 ${activeTab === 'users' ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-100'}`}><UsersIcon size={16} /> จัดการผู้ใช้งาน</button>
                        <button onClick={() => setActiveTab('locations')} className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap flex items-center gap-2 ${activeTab === 'locations' ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-100'}`}><MapIcon size={16} /> จัดการสถานที่</button>
                        <button onClick={() => setActiveTab('requests')} className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap flex items-center gap-2 ${activeTab === 'requests' ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-100'}`}><ListIcon size={16} /> จัดการรายการเรียกรถ</button>
                    </div>

                    {activeTab === 'stats' && (
                        <div className="space-y-6 animate-in fade-in duration-300">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                <h2 className="text-xl font-bold text-slate-800">Admin Dashboard</h2>
                                <div className="flex gap-2">
                                    <button onClick={handleExport} className="flex items-center gap-2 text-sm bg-white border border-slate-300 px-3 py-2 rounded-lg hover:bg-slate-50 text-slate-700"><FileText size={16} /> Export Requests</button>
                                    <button onClick={handleExportTrips} className="flex items-center gap-2 text-sm bg-blue-600 border border-blue-600 text-white px-3 py-2 rounded-lg hover:bg-blue-700 shadow-sm"><Download size={16} /> Export Trips CSV</button>
                                </div>
                            </div>

                            <Card className="bg-slate-50 border-blue-100">
                                <div className="flex flex-col md:flex-row gap-4 items-end">
                                    <div className="w-full md:w-auto">
                                        <label className="text-xs font-semibold text-slate-500 mb-1 block">ช่วงเวลา</label>
                                        <select className="w-full md:w-40 p-2 border rounded-lg text-sm" value={filterType} onChange={(e) => setFilterType(e.target.value)}>
                                            <option value="daily">รายวัน (Daily)</option>
                                            <option value="monthly">รายเดือน (Monthly)</option>
                                            <option value="range">ช่วงเวลา (Custom Range)</option>
                                        </select>
                                    </div>
                                    {filterType === 'daily' && (<div className="w-full md:w-auto"><label className="text-xs font-semibold text-slate-500 mb-1 block">เลือกวันที่</label><input type="date" className="w-full p-2 border rounded-lg text-sm" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} /></div>)}
                                    {filterType === 'monthly' && (<div className="w-full md:w-auto"><label className="text-xs font-semibold text-slate-500 mb-1 block">เลือกเดือน</label><input type="month" className="w-full p-2 border rounded-lg text-sm" value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} /></div>)}
                                    {filterType === 'range' && (<div className="flex gap-2 w-full md:w-auto"><div><label className="text-xs font-semibold text-slate-500 mb-1 block">เริ่มต้น</label><input type="date" className="w-full p-2 border rounded-lg text-sm" value={startDate} onChange={(e) => setStartDate(e.target.value)} /></div><div><label className="text-xs font-semibold text-slate-500 mb-1 block">สิ้นสุด</label><input type="date" className="w-full p-2 border rounded-lg text-sm" value={endDate} onChange={(e) => setEndDate(e.target.value)} /></div></div>)}
                                    <div className="w-full md:w-auto">
                                        <label className="text-xs font-semibold text-slate-500 mb-1 block">คนขับ (Driver)</label>
                                        <select className="w-full md:w-48 p-2 border rounded-lg text-sm" value={selectedDriver} onChange={(e) => setSelectedDriver(e.target.value)}><option value="all">คนขับทั้งหมด (All Drivers)</option>{(users||[]).filter(u => u && u.role === 'driver').map(d => (<option key={d.id} value={d.id}>{d.name}</option>))}</select>
                                    </div>
                                </div>
                            </Card>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {[{ label: 'Total (Trips)', val: totalTrips, color: 'text-slate-800', bg: 'bg-white' }, { label: 'Finished', val: completedTrips, color: 'text-green-600', bg: 'bg-green-50' }, { label: 'Ongoing', val: activeTrips, color: 'text-blue-600', bg: 'bg-blue-50' }, { label: 'Waiting', val: pendingTrips, color: 'text-amber-600', bg: 'bg-amber-50' }].map((stat, i) => (
                                    <div key={i} className={`${stat.bg} p-4 rounded-xl border border-slate-100 shadow-sm`}><div className="text-slate-500 text-xs uppercase tracking-wide font-semibold mb-1">{stat.label}</div><div className={`text-3xl font-bold ${stat.color}`}>{stat.val}</div></div>
                                ))}
                            </div>

                            <div className="grid md:grid-cols-2 gap-6 mt-6">
                                {/* 1. กราฟแท่งปริมาณงานรายวัน (สูงชัน) */}
                                <Card className="border-blue-100 bg-white col-span-1 flex flex-col">
                                    <h3 className="font-semibold text-slate-700 mb-2 flex items-center gap-2"><BarChart2 size={20} className="text-blue-500" /> 1. ปริมาณงาน (สำเร็จ)</h3>
                                    
                                    <div className="h-64 flex items-end gap-6 overflow-x-auto pb-4 px-2 pt-8 mt-2 scrollbar-thin scrollbar-thumb-slate-200">
                                        {chart1Data.data.map((item, index) => {
                                            return (
                                                <div key={index} className="flex-1 min-w-[max-content] h-full flex flex-col items-center gap-2 group">
                                                    <div className="w-full flex-1 flex items-end justify-center gap-1 h-full">
                                                        
                                                        {chart1Data.type === 'monthly' ? (
                                                            /* 💡 โหมดรายเดือน (Monthly): แสดงแท่ง Total แท่งเดียวซ่อนเลขด้านใน */
                                                            item.total > 0 && (
                                                                <div className="w-8 sm:w-10 relative flex flex-col justify-end items-center h-full" title={`รวมทั้งหมด: ${item.total} เที่ยว`}>
                                                                    <div 
                                                                        className="w-full bg-gradient-to-t from-blue-600 to-blue-400 rounded-t-sm shadow-sm transition-all flex justify-center items-start pt-1.5" 
                                                                        style={{ height: `${Math.min(100, Math.max(0, (item.total / maxChart1Scale) * 100))}%`, minHeight: item.total > 0 ? '24px' : '0' }}
                                                                    >
                                                                        <span className="text-white font-bold text-xs drop-shadow-md">{item.total}</span>
                                                                    </div>
                                                                </div>
                                                            )
                                                        ) : (
                                                            /* 💡 โหมดรายวัน/ช่วงเวลา: แสดงแยกคนขับ (Grouped) + แท่ง Total สีเข้มซ่อนเลขด้านใน */
                                                            <>
                                                                {Object.entries(item.drivers).map(([dName, count], idx) => {
                                                                    const dHeight = Math.min(100, Math.max(0, (count / maxChart1Scale) * 100));
                                                                    return (
                                                                        <div key={idx} className="w-5 sm:w-6 relative flex flex-col justify-end items-center h-full" title={`${dName}: ${count}`}>
                                                                            <div 
                                                                                className="w-full rounded-t-sm shadow-sm transition-all flex justify-center items-start pt-1.5" 
                                                                                style={{ height: `${dHeight}%`, backgroundColor: getDriverColor(dName), minHeight: count > 0 ? '24px' : '0' }}
                                                                            >
                                                                                {count > 0 && <span className="text-white font-bold text-[10px] drop-shadow-md">{count}</span>}
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                })}
                                                                {item.total > 0 && (
                                                                    <div className="w-6 sm:w-8 relative flex flex-col justify-end items-center h-full ml-1" title={`Total: ${item.total}`}>
                                                                        <div 
                                                                            className="w-full bg-slate-700 rounded-t-sm shadow-sm transition-all flex justify-center items-start pt-1.5" 
                                                                            style={{ height: `${Math.min(100, Math.max(0, (item.total / maxChart1Scale) * 100))}%`, minHeight: item.total > 0 ? '24px' : '0' }}
                                                                        >
                                                                            <span className="text-white font-bold text-[10px] drop-shadow-md">{item.total}</span>
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </>
                                                        )}
                                                    </div>
                                                    <div className="text-[11px] text-slate-500 font-bold whitespace-nowrap h-4">{item.label}</div>
                                                </div>
                                            );
                                        })}
                                        {chart1Data.data.every(d => d.total === 0) && <div className="w-full h-full flex items-center justify-center text-slate-400 text-sm w-[200px]">ไม่มีข้อมูลในช่วงเวลานี้</div>}
                                    </div>
                                    <div className="flex flex-wrap gap-3 mt-4 pt-4 border-t px-2">
                                        {chart1Data.type === 'monthly' ? (
                                            <div className="flex items-center gap-1.5 text-[11px] font-bold bg-blue-50 px-2 py-1 rounded border border-blue-200">
                                                <div className="w-2.5 h-2.5 rounded-sm bg-blue-500"></div>
                                                <span className="text-blue-700">ยอดรวมของเดือน (Total)</span>
                                            </div>
                                        ) : (
                                            <>
                                                {driverUsers.map(dName => {
                                                    const hasJob = chart1Data.data.some(d => d.drivers[dName] > 0);
                                                    if (!hasJob) return null;
                                                    return (
                                                        <div key={dName} className="flex items-center gap-1.5 text-[11px] font-medium bg-slate-50 px-2 py-1 rounded border">
                                                            <div className="w-2.5 h-2.5 rounded-sm" style={{ backgroundColor: getDriverColor(dName) }}></div>
                                                            <span className="text-slate-600">{dName}</span>
                                                        </div>
                                                    );
                                                })}
                                                {chart1Data.data.some(d => d.total > 0) && (
                                                    <div className="flex items-center gap-1.5 text-[11px] font-bold bg-slate-100 px-2 py-1 rounded border border-slate-300 ml-1">
                                                        <div className="w-2.5 h-2.5 rounded-sm bg-slate-700"></div>
                                                        <span className="text-slate-700">Total</span>
                                                    </div>
                                                )}
                                            </>
                                        )}
                                    </div>
                                </Card>

                                {/* 2. กราฟแท่งปริมาณงานแยกตามจุดส่ง (คนละสี) */}
                                <Card className="border-blue-100 bg-white col-span-1">
                                    <h3 className="font-semibold text-slate-700 mb-6 flex items-center gap-2"><MapPin size={20} className="text-rose-500" /> 2. ปริมาณงานแยกตามจุดส่ง (สำเร็จ)</h3>
                                    <div className="h-64 overflow-y-auto pr-2 space-y-4">
                                        {locationVolume.length > 0 ? locationVolume.map((loc, index) => (
                                            <div key={index} className="group">
                                                <div className="flex justify-between text-sm mb-1">
                                                    <span className="text-slate-700 font-medium">{loc.name}</span>
                                                </div>
                                                <div className="w-full bg-slate-100 rounded-full h-6 overflow-hidden relative shadow-inner">
                                                    <div 
                                                        className="h-full rounded-full transition-all duration-500 flex items-center justify-end pr-2 text-white text-xs font-bold" 
                                                        style={{ width: `${Math.max(5, (loc.count / maxVolumeLoc) * 100)}%`, backgroundColor: CHART_COLORS[index % CHART_COLORS.length] }}
                                                    >
                                                        {loc.count > 0 && `${loc.count} เที่ยว`}
                                                    </div>
                                                </div>
                                            </div>
                                        )) : (
                                            <div className="h-full flex items-center justify-center text-slate-400">ไม่มีข้อมูลในช่วงเวลานี้</div>
                                        )}
                                    </div>
                                </Card>

                                {/* 3. กราฟวงกลม Requester (Pie Chart) นำกลับมาแล้ว! */}
                                <Card className="border-blue-100 bg-white col-span-1">
                                    <h3 className="font-semibold text-slate-700 mb-6 flex items-center gap-2"><PieChart size={20} className="text-purple-500" /> 3. สัดส่วนงานตามผู้ร้องขอ</h3>
                                    <div className="h-64 pb-6">
                                        <SvgPieChart data={requesterData} colors={CHART_COLORS} isDonut={false} />
                                    </div>
                                </Card>

                                {/* 4. กราฟโดนัท สถานะงาน (Donut Chart) นำกลับมาแล้ว! */}
                                <Card className="border-blue-100 bg-white col-span-1">
                                    <h3 className="font-semibold text-slate-700 mb-6 flex items-center gap-2"><TrendingUp size={20} className="text-green-500" /> 4. สัดส่วนงานสำเร็จ vs ค้าง</h3>
                                    <div className="h-64 pb-6">
                                        <SvgPieChart data={completionData} colors={['#10b981', '#f59e0b']} isDonut={true} />
                                    </div>
                                </Card>

                            </div>
                        </div>
                    )}
                    {/* 💡 ส่งฟังก์ชัน onRefresh ไปยังลูกๆ เพื่อให้หลังบันทึก/ลบ มันอัปเดตหน้าจอทันที */}
                    {activeTab === 'users' && (<AdminUserManagement users={users} setUsers={setUsers} onRefresh={onRefresh} />)}
                    {activeTab === 'locations' && (<AdminLocationManagement locations={locations} setLocations={setLocations} onRefresh={onRefresh} />)}
                    {activeTab === 'requests' && (<AdminRequestManagement requests={requests} setRequests={setRequests} locations={locations} onCreateRequest={onCreateRequest} onRefresh={onRefresh} />)}
                </div>
            );
        };

        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [users, setUsers] = useState([]);
            const [requests, setRequests] = useState([]);
            const [locations, setLocations] = useState([]);
            const [loading, setLoading] = useState(true);
            
            const [showInstallPage, setShowInstallPage] = useState(false);
            const isUpdating = useRef(false);
            
            // 💡 State สำหรับระบบแจ้งเตือน
            const [toastMsg, setToastMsg] = useState(null);
            const prevRequestsRef = useRef([]);

            // 💡 ขออนุญาตแจ้งเตือนเมื่อโหลดหน้าแรก (ย้ายมาไว้ข้างนอกเพื่อให้ทำงานกับทุกคน)
            useEffect(() => {
                if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
                    Notification.requestPermission();
                }
            }, []);

            useEffect(() => {
                const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
                if (!isStandalone) {
                    setShowInstallPage(true);
                }

                const savedUser = localStorage.getItem('transportSysUser');
                if (savedUser) {
                    try { setCurrentUser(JSON.parse(savedUser)); } catch(e){}
                }
                
                fetchData(true);

                const interval = setInterval(() => {
                    fetchData(false); 
                }, 10000); 

                return () => clearInterval(interval);
            }, []);

            const fetchData = (showLoading = true) => {
                if (isUpdating.current) return; 

                if (showLoading) setLoading(true);
                
                callAPI('getInitialData')
                    .then(data => {
                        if (data && !isUpdating.current) { 
                            if(data.users) setUsers(data.users);
                            if(data.requests) {
                                const sortedReqs = data.requests.sort((a, b) => Number(b.id) - Number(a.id));
                                setRequests(sortedReqs);
                            }
                            if(data.locations) setLocations(data.locations);
                        }
                        if (showLoading) setLoading(false);
                    })
                    .catch((error) => {
                        console.error(error);
                        if (showLoading) setLoading(false);
                    });
            };

            // 💡 ระบบตรวจจับและแจ้งเตือนทุกคนที่ติดตั้ง App (อัปเดต Badge และ System Notification)
            useEffect(() => {
                // เปลี่ยนเงื่อนไขให้ตรวจสอบทุก roles ไม่เฉพาะ driver
                if (currentUser && requests.length > 0) {
                    const prevReqs = prevRequestsRef.current;
                    
                    // คำนวณจำนวนงานที่ค้างอยู่ (Pending) ทั้งหมด
                    const pendingCount = requests.filter(r => r.status === 'pending').length;

                    // 1. อัปเดตตัวเลขสีแดงบนไอคอนแอป (Badging API) - รองรับ API รุ่นเก่าด้วย
                    if (navigator.setAppBadge) {
                        if (pendingCount > 0) {
                            navigator.setAppBadge(pendingCount).catch(e => console.log('Badge error:', e));
                        } else {
                            navigator.clearAppBadge().catch(e => console.log('Badge error:', e));
                        }
                    } else if (navigator.setExperimentalAppBadge) {
                        if (pendingCount > 0) {
                            navigator.setExperimentalAppBadge(pendingCount).catch(console.error);
                        } else {
                            navigator.clearExperimentalAppBadge().catch(console.error);
                        }
                    }
                    
                    if (prevReqs.length > 0) {
                        const newReqs = requests.filter(r => !prevReqs.find(pr => pr.id === r.id));
                        const newPending = newReqs.filter(r => r.status === 'pending');

                        if (newPending.length > 0) {
                            const msg = `🚨 มีงานใหม่เข้า! รับที่: ${newPending[0].pickup}`;
                            
                            // โชว์แบนเนอร์ในแอป (เฉพาะ driver หรือ admin เท่านั้นที่อาจจะสนใจ)
                            if (currentUser.role === 'driver' || currentUser.role === 'admin') {
                                setToastMsg(msg);
                            }
                            
                            // 2. เด้งแจ้งเตือนระบบ (System Notification) นอกเบราว์เซอร์
                            if ('Notification' in window && Notification.permission === 'granted') {
                                // 💡 แก้ไขปัญหาแจ้งเตือนไม่เด้งบนมือถือ/PWA: ต้องใช้ Service Worker showNotification แทน new Notification
                                if ('serviceWorker' in navigator && navigator.serviceWorker.ready) {
                                    navigator.serviceWorker.ready.then(registration => {
                                        registration.showNotification('TransportSys (งานใหม่)', {
                                            body: msg,
                                            icon: 'https://cdn-icons-png.flaticon.com/512/709/709790.png',
                                            badge: 'https://cdn-icons-png.flaticon.com/512/709/709790.png',
                                            vibrate: [200, 100, 200, 100, 200],
                                            tag: 'new-job-' + Date.now()
                                        });
                                    });
                                } else {
                                    new Notification('TransportSys (งานใหม่)', {
                                        body: msg,
                                        icon: 'https://cdn-icons-png.flaticon.com/512/709/709790.png'
                                    });
                                }
                            }
                            
                            // เล่นเสียง
                            try {
                                const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                                audio.play().catch(e => console.log('Auto-play blocked'));
                            } catch (e) { console.log('เบราว์เซอร์บล็อกการเล่นเสียงอัตโนมัติ'); }

                            if (currentUser.role === 'driver' || currentUser.role === 'admin') {
                                setTimeout(() => setToastMsg(null), 6000);
                            }
                        }
                    }
                    prevRequestsRef.current = requests;
                }
            }, [requests, currentUser]);

            const handleLogin = (user) => {
                setCurrentUser(user);
                localStorage.setItem('transportSysUser', JSON.stringify(user));
                
                // ขออนุญาตแจ้งเตือนอีกครั้งตอนล็อกอินเผื่อพลาดยอมรับรอบแรก
                if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
                    Notification.requestPermission();
                }
            };

            const handleLogout = () => {
                setCurrentUser(null);
                localStorage.removeItem('transportSysUser');
                // ล้างตัวเลขที่ไอคอนตอนล็อกเอาต์
                if ('clearAppBadge' in navigator) {
                    navigator.clearAppBadge().catch(console.error);
                } else if ('clearExperimentalAppBadge' in navigator) {
                    navigator.clearExperimentalAppBadge().catch(console.error);
                }
            };

            const handleCreateRequest = (data) => {
                isUpdating.current = true; 
                const newReqId = Date.now();
                const initialTrips = Array.from({ length: data.tripsNeeded }, (_, i) => ({ 
                    id: `${newReqId}-${i}`, status: 'waiting', startTime: null, endTime: null, driverId: null, driverName: null
                }));
                const newReq = { 
                    id: newReqId, requesterId: currentUser.id, requesterName: currentUser.name, 
                    ...data, 
                    pallets: data.pallets || 0,
                    status: 'pending', tripsCompleted: 0, createdAt: new Date().toISOString(), trips: initialTrips 
                };
                
                const updatedRequests = [newReq, ...requests].sort((a, b) => Number(b.id) - Number(a.id));
                setRequests(updatedRequests); 
                
                callAPI('createRequest', { reqData: newReq })
                    .then((res) => {
                        if (res && res.success === false) alert("⚠️ เกิดข้อผิดพลาดในการบันทึกข้อมูล: " + res.message);
                        isUpdating.current = false;
                        fetchData(false); 
                    })
                    .catch(() => { isUpdating.current = false; });
            };

            const handleAcceptTrip = (reqId, tripId) => {
                isUpdating.current = true;
                
                const timeString = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
                localStorage.setItem(`accepted_time_${tripId}`, timeString);

                setRequests(requests.map(req => {
                    if (req.id === reqId) {
                        const updatedTrips = req.trips.map(t => t.id === tripId ? { ...t, driverId: currentUser.id, driverName: currentUser.name } : t);
                        let newStatus = req.status;
                        const takenCount = updatedTrips.filter(t => t.driverId).length;
                        if (req.status === 'pending' && takenCount > 0) newStatus = 'assigned';
                        if (takenCount === req.tripsNeeded) newStatus = 'assigned';
                        
                        callAPI('updateTripStatus', { tripId, status: 'waiting', driverId: currentUser.id, driverName: currentUser.name })
                            .then(() => {
                                if (newStatus !== req.status) {
                                    return callAPI('updateRequestStatus', { reqId, status: newStatus });
                                }
                            })
                            .then(() => {
                                isUpdating.current = false; 
                                fetchData(false); 
                            })
                            .catch(() => { isUpdating.current = false; });

                        return { ...req, trips: updatedTrips, status: newStatus };
                    }
                    return req;
                }));
            };

            const handleUpdateTripStatus = (reqId, tripId, action, pallets = 0) => {
                isUpdating.current = true; 

                setRequests(requests.map(req => {
                    if (req.id === reqId) {
                        const timeString = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
                        const dateString = new Date().toISOString().split('T')[0];

                        const updatedTrips = req.trips.map(t => {
                            if (t.id === tripId) {
                                if (action === 'start') return { ...t, status: 'ongoing', startTime: timeString };
                                else if (action === 'end') return { ...t, status: 'finished', endTime: timeString, date: dateString, pallets: Number(pallets) }; 
                            }
                            return t;
                        });
                        
                        const completed = updatedTrips.filter(t => t.status === 'finished').length;
                        const anyOngoing = updatedTrips.some(t => t.status === 'ongoing');
                        let reqStatus = req.status;
                        
                        if (completed >= Number(req.tripsNeeded)) reqStatus = 'completed';
                        else if (anyOngoing || completed > 0) reqStatus = 'in_progress';
                        
                        callAPI('updateTripStatus', { tripId, status: action === 'start' ? 'ongoing' : 'finished', driverId: currentUser.id, driverName: currentUser.name, pallets: Number(pallets) })
                            .then(() => {
                                if (reqStatus !== req.status) {
                                    return callAPI('updateRequestStatus', { reqId, status: reqStatus });
                                }
                            })
                            .then(() => {
                                isUpdating.current = false; 
                                fetchData(false);
                            })
                            .catch(() => { isUpdating.current = false; });

                        return { ...req, trips: updatedTrips, tripsCompleted: completed, status: reqStatus };
                    }
                    return req;
                }));
            };

            if (showInstallPage) {
                return <InstallScreen onSkip={() => setShowInstallPage(false)} />;
            }

            if (loading) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-slate-50">
                        <div className="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4" style={{animation: 'spin 1s linear infinite'}}></div>
                        <style>{`@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }`}</style>
                        <h2 className="text-slate-600 font-medium text-lg">กำลังโหลดข้อมูลจากฐานข้อมูล...</h2>
                    </div>
                );
            }
            
            if (!currentUser) return <LoginScreen users={users} onLogin={handleLogin} refreshData={() => fetchData(true)} />;

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 font-sans relative">
                    {/* 💡 UI ของกล่องแจ้งเตือนในแอป (Toast) */}
                    {toastMsg && (
                        <div className="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 animate-in slide-in-from-top-4 fade-in duration-300 w-[90%] max-w-sm">
                            <div className="bg-blue-600 text-white px-5 py-3 rounded-2xl shadow-xl font-medium flex items-center justify-between gap-3 border border-blue-400">
                                <div className="flex items-center gap-3">
                                    <div className="bg-white/20 p-2 rounded-full">
                                        <Bell className="animate-bounce" size={20} />
                                    </div>
                                    <span className="text-sm leading-tight whitespace-pre-line">{toastMsg}</span>
                                </div>
                                <button onClick={() => setToastMsg(null)} className="p-1 hover:bg-white/20 rounded-full transition-colors">
                                    <X size={18} />
                                </button>
                            </div>
                        </div>
                    )}

                    <header className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
                        <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-600 p-1.5 rounded-lg"><Truck className="text-white w-5 h-5" /></div>
                                <span className="font-bold text-lg text-slate-800 hidden md:block">TransportSys</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="flex flex-col items-end mr-2">
                                    <span className="text-sm font-semibold text-slate-700">{currentUser.name}</span>
                                    <span className="text-xs text-slate-400 uppercase">{currentUser.role}</span>
                                </div>
                                <button onClick={handleLogout} className="text-slate-400 hover:text-red-500 transition-colors p-2 hover:bg-red-50 rounded-full"><LogOut size={20} /></button>
                            </div>
                        </div>
                    </header>
                    <main className="max-w-5xl mx-auto px-4 py-8">
                        {currentUser.role === 'requester' && (<RequesterDashboard requests={requests} onCreateRequest={handleCreateRequest} currentUserId={currentUser.id} currentUser={currentUser} locations={locations} />)}
                        {currentUser.role === 'driver' && (<DriverDashboard requests={requests} currentUser={currentUser} onAcceptTrip={handleAcceptTrip} onUpdateTripStatus={handleUpdateTripStatus} />)}
                        {/* 💡 ส่งฟังก์ชัน onRefresh ไปที่ AdminDashboard เพื่อให้รีเฟรชข้อมูลหลังบ้านใหม่หลังการแก้ไข */}
                        {currentUser.role === 'admin' && (<AdminDashboard requests={requests} setRequests={setRequests} users={users} setUsers={setUsers} locations={locations} setLocations={setLocations} onCreateRequest={handleCreateRequest} onRefresh={() => fetchData(true)} />)}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
