<!DOCTYPE html>
<html lang="th" className="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TransportSys</title>
    
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/709/709790.png">
    
    <script>
        window.addEventListener('error', function(e) { console.error("Global Error:", e.message); });
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                if (window.location.protocol.startsWith('http') && !window.location.href.includes('blob:')) {
                    navigator.serviceWorker.register('./sw.js').catch(function(error) {
                        console.log('Service Worker สแตนด์บายพร้อมทำงาน:', error.message);
                    });
                }
            });
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 💡 ตั้งค่าให้ Tailwind รองรับโหมดมืด (Dark Mode)
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        #qr-reader__dashboard_section_csr span { display: none !important; }
        #qr-reader { border: none !important; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        /* Custom Scrollbar for better UI in dark/light mode */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-200">
    <div id="root">
        <div style="padding: 20px; color: #666; text-align: center; font-family: sans-serif; margin-top: 20vh;">
            <div style="width: 40px; height: 40px; border: 4px solid #bfdbfe; border-top: 4px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px auto;"></div>
            <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
            กำลังเริ่มต้นระบบ...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, Component } = React;

        const API_URL = "https://script.google.com/macros/s/AKfycbxBp4lTwyZ21SOGZ2afHqM20apwhr8dyXW2N2RYP9BQxdZLO4vidHExR55cAJBqxpwgpA/exec"; 

        const callAPI = async (action, payload = {}) => {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, ...payload })
                });
                return await response.json();
            } catch (error) {
                console.error("API Error:", error);
                throw error;
            }
        };

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-4 bg-red-50 dark:bg-red-900/30 text-red-800 dark:text-red-200 m-4 rounded-lg border border-red-200 dark:border-red-800">
                            <h2 className="font-bold text-lg mb-2">⚠️ ระบบพบปัญหาในการแสดงผล</h2>
                            <p className="text-sm">{this.state.error && this.state.error.toString()}</p>
                            <button onClick={() => window.location.reload()} className="mt-4 bg-red-600 text-white px-4 py-2 rounded">รีเฟรชหน้าจอ</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- ICONS ---
        const SvgIcon = ({ children, size = 24, className = '', color = "currentColor", ...rest }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...rest}>{children}</svg>
        );
        const Truck = (p) => <SvgIcon {...p}><rect x="1" y="3" width="15" height="13" /><polygon points="16 8 20 8 23 11 23 16 16 16 16 8" /><circle cx="5.5" cy="18.5" r="2.5" /><circle cx="18.5" cy="18.5" r="2.5" /></SvgIcon>;
        const MapPin = (p) => <SvgIcon {...p}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></SvgIcon>;
        const Calendar = (p) => <SvgIcon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></SvgIcon>;
        const Clock = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></SvgIcon>;
        const User = (p) => <SvgIcon {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></SvgIcon>;
        const LogOut = (p) => <SvgIcon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></SvgIcon>;
        const PlusCircle = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="16" /><line x1="8" y1="12" x2="16" y2="12" /></SvgIcon>;
        const CheckCircle = (p) => <SvgIcon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></SvgIcon>;
        const AlertCircle = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></SvgIcon>;
        const Play = (p) => <SvgIcon {...p}><polygon points="5 3 19 12 5 21 5 3" /></SvgIcon>;
        const FileText = (p) => <SvgIcon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" /></SvgIcon>;
        const BarChart2 = (p) => <SvgIcon {...p}><line x1="18" y1="20" x2="18" y2="10" /><line x1="12" y1="20" x2="12" y2="4" /><line x1="6" y1="20" x2="6" y2="14" /></SvgIcon>;
        const Bell = (p) => <SvgIcon {...p}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 0 1-3.46 0" /></SvgIcon>;
        const Search = (p) => <SvgIcon {...p}><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></SvgIcon>;
        const Lock = (p) => <SvgIcon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></SvgIcon>;
        const Eye = (p) => <SvgIcon {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></SvgIcon>;
        const EyeOff = (p) => <SvgIcon {...p}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" /><line x1="1" y1="1" x2="23" y2="23" /></SvgIcon>;
        const UsersIcon = (p) => <SvgIcon {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></SvgIcon>;
        const Edit = (p) => <SvgIcon {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></SvgIcon>;
        const Trash2 = (p) => <SvgIcon {...p}><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></SvgIcon>;
        const Save = (p) => <SvgIcon {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2-2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></SvgIcon>;
        const X = (p) => <SvgIcon {...p}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></SvgIcon>;
        const ListIcon = (p) => <SvgIcon {...p}><line x1="8" y1="6" x2="21" y2="6" /><line x1="8" y1="12" x2="21" y2="12" /><line x1="8" y1="18" x2="21" y2="18" /><line x1="3" y1="6" x2="3.01" y2="6" /><line x1="3" y1="12" x2="3.01" y2="12" /><line x1="3" y1="18" x2="3.01" y2="18" /></SvgIcon>;
        const MapIcon = (p) => <SvgIcon {...p}><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" /><line x1="8" y1="2" x2="8" y2="18" /><line x1="16" y1="6" x2="16" y2="22" /></SvgIcon>;
        const CameraIcon = (p) => <SvgIcon {...p}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" /><circle cx="12" cy="13" r="4" /></SvgIcon>;
        const Camera = CameraIcon; 
        const QrCode = (p) => <SvgIcon {...p}><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><rect x="7" y="7" width="3" height="3" /><rect x="14" y="7" width="3" height="3" /><rect x="7" y="14" width="3" height="3" /><rect x="14" y="14" width="3" height="3" /></SvgIcon>;
        const PieChart = (p) => <SvgIcon {...p}><path d="M21.21 15.89A10 10 0 1 1 8 2.83" /><path d="M22 12A10 10 0 0 0 12 2v10z" /></SvgIcon>;
        const Download = (p) => <SvgIcon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></SvgIcon>;
        const Briefcase = (p) => <SvgIcon {...p}><rect x="2" y="7" width="20" height="14" rx="2" ry="2" /><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></SvgIcon>;
        const Share = (p) => <SvgIcon {...p}><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></SvgIcon>;
        const TrendingUp = (p) => <SvgIcon {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18" /><polyline points="17 6 23 6 23 12" /></SvgIcon>;
        const Navigation = (p) => <SvgIcon {...p}><polygon points="3 11 22 2 13 21 11 13 3 11"/></SvgIcon>;
        const Activity = (p) => <SvgIcon {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></SvgIcon>;
        const Sun = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></SvgIcon>;
        const Moon = (p) => <SvgIcon {...p}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></SvgIcon>;
        const GripHorizontal = (p) => <SvgIcon {...p}><circle cx="12" cy="9" r="1"/><circle cx="19" cy="9" r="1"/><circle cx="5" cy="9" r="1"/><circle cx="12" cy="15" r="1"/><circle cx="19" cy="15" r="1"/><circle cx="5" cy="15" r="1"/></SvgIcon>;
        const Maximize = (p) => <SvgIcon {...p}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></SvgIcon>;

        // 💡 ชุดสีสันสำหรับกราฟ (Color Palette) 30 สีไม่ซ้ำกัน
        const EXTENDED_PALETTE = [
            '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', 
            '#06b6d4', '#f97316', '#6366f1', '#14b8a6', '#ef4444',
            '#84cc16', '#0ea5e9', '#d946ef', '#f43f5e', '#eab308',
            '#22c55e', '#64748b', '#78716c', '#a855f7', '#0284c7',
            '#dc2626', '#ea580c', '#65a30d', '#059669', '#0891b2',
            '#4f46e5', '#9333ea', '#be123c', '#be185d', '#b45309'
        ];

        let globalColorIndex = 0;
        const globalColorMap = {};

        const getEntityColor = (name) => {
            if (!name) return '#94a3b8';
            if (!globalColorMap[name]) {
                globalColorMap[name] = EXTENDED_PALETTE[globalColorIndex % EXTENDED_PALETTE.length];
                globalColorIndex++;
            }
            return globalColorMap[name];
        };

        const getNormalizedColorName = (name) => {
            if (!name) return '';
            const nameMap = {
                'RM01 WH': 'RM01',
                'Thinner Plant': 'Thinner',
                'Water Base Plant': 'Water base',
                'Dome WH': 'Dome',
                'CED Plant': 'CED',
                'Waterborne WH': 'Waterbornce',
                'Main inventory WH': 'Main inventory'
            };
            return nameMap[name] || name;
        };

        const SvgPieChart = ({ data, colors, isDonut }) => {
            const total = data.reduce((sum, d) => sum + d.value, 0);
            if (total === 0) return <div className="text-slate-400 dark:text-slate-500 text-center h-full flex items-center justify-center">ไม่มีข้อมูลในช่วงเวลานี้</div>;

            let cumulativePercent = 0;

            return (
                <div className="flex flex-col items-center justify-center h-full w-full pointer-events-none">
                    <div className="relative w-48 h-48 mb-6 mt-4">
                        <svg viewBox="-1.2 -1.2 2.4 2.4" className="w-full h-full drop-shadow-md" style={{ transform: 'rotate(-90deg)' }}>
                            {data.map((slice, i) => {
                                const startPercent = cumulativePercent;
                                const slicePercent = slice.value / total;
                                const endPercent = cumulativePercent + slicePercent;
                                cumulativePercent = endPercent;

                                if (slicePercent === 1) {
                                    return (
                                        <g key={i}>
                                            <circle cx="0" cy="0" r="1" fill={colors[i % colors.length]} />
                                            <text x="0" y="0" fill="#fff" fontSize="0.25" textAnchor="middle" dominantBaseline="central" fontWeight="bold" style={{ transform: 'rotate(90deg)' }}>
                                                {isDonut ? `${Math.round(slicePercent * 100)}%` : slice.value}
                                            </text>
                                        </g>
                                    );
                                }

                                const startX = Math.cos(2 * Math.PI * startPercent);
                                const startY = Math.sin(2 * Math.PI * startPercent);
                                const endX = Math.cos(2 * Math.PI * endPercent);
                                const endY = Math.sin(2 * Math.PI * endPercent);
                                const largeArcFlag = slicePercent > 0.5 ? 1 : 0;
                                
                                const pathData = [
                                    `M ${startX} ${startY}`,
                                    `A 1 1 0 ${largeArcFlag} 1 ${endX} ${endY}`,
                                    `L 0 0`,
                                ].join(' ');

                                const midPercent = startPercent + slicePercent / 2;
                                const labelRadius = isDonut ? 0.75 : 0.6; 
                                const labelX = Math.cos(2 * Math.PI * midPercent) * labelRadius;
                                const labelY = Math.sin(2 * Math.PI * midPercent) * labelRadius;

                                return (
                                    <g key={i} className="transition-all hover:opacity-80">
                                        <path d={pathData} fill={colors[i % colors.length]} stroke="rgba(255,255,255,0.5)" strokeWidth="0.03" />
                                        {slicePercent > 0.05 && (
                                            <text x={labelX} y={labelY} fill="#fff" fontSize="0.2" textAnchor="middle" dominantBaseline="central" fontWeight="bold" style={{ transform: 'rotate(90deg)', transformOrigin: `${labelX}px ${labelY}px` }}>
                                                {isDonut ? `${Math.round(slicePercent * 100)}%` : slice.value}
                                            </text>
                                        )}
                                    </g>
                                );
                            })}
                            
                            {isDonut && <circle cx="0" cy="0" r="0.5" className="fill-white dark:fill-slate-800" />}
                            {isDonut && (
                                <text x="0" y="0" className="fill-slate-800 dark:fill-white" fontSize="0.25" textAnchor="middle" dominantBaseline="central" fontWeight="bold" style={{ transform: 'rotate(90deg)' }}>
                                    {total}
                                </text>
                            )}
                        </svg>
                    </div>
                    <div className="flex flex-wrap justify-center gap-2 text-xs w-full px-2">
                        {data.map((d, i) => (
                            <div key={i} className="flex items-center gap-1.5 bg-slate-50 dark:bg-slate-700/50 px-2.5 py-1 rounded-md border border-slate-200 dark:border-slate-600">
                                <span className="w-3 h-3 rounded-full shadow-sm" style={{ backgroundColor: colors[i % colors.length] }}></span>
                                <span className="text-slate-700 dark:text-slate-300 font-medium">{d.name} <span className="text-slate-400 dark:text-slate-400">({d.value})</span></span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const formatTimeHelper = (isoString, reqId) => {
            if (reqId && !isNaN(Number(reqId)) && Number(reqId) > 1600000000000) {
                return new Date(Number(reqId)).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            }
            if (!isoString) return '';
            try {
                const d = new Date(isoString);
                return isNaN(d.getTime()) ? '' : d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            } catch (e) { return ''; }
        };

        const Card = ({ children, className = '' }) => (
            <div className={`bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 ${className}`}>{children}</div>
        );
        
        const StatusBadge = ({ status }) => {
            const styles = { 
                pending: 'bg-yellow-100 dark:bg-yellow-900/30 text-yellow-800 dark:text-yellow-400', 
                assigned: 'bg-blue-100 dark:bg-blue-900/30 text-blue-800 dark:text-blue-400', 
                in_progress: 'bg-indigo-100 dark:bg-indigo-900/30 text-indigo-800 dark:text-indigo-400', 
                completed: 'bg-green-100 dark:bg-green-900/30 text-green-800 dark:text-green-400', 
                cancelled: 'bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-400' 
            };
            const labels = { pending: 'รอคนรับงาน', assigned: 'มีคนรับแล้ว', in_progress: 'กำลังดำเนินการ', completed: 'เสร็จสิ้น', cancelled: 'ยกเลิก' };
            return (<span className={`px-3 py-1 rounded-full text-xs font-semibold border border-transparent ${styles[status] || 'bg-gray-100 dark:bg-gray-800 text-gray-800 dark:text-gray-300'}`}>{labels[status] || status}</span>);
        };

        // ==========================================
        // 🚀 หน้าต่าง Install App (PWA)
        // ==========================================
        const InstallScreen = ({ onSkip }) => {
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [showIosInstruction, setShowIosInstruction] = useState(false);
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                });
            }, []);

            const handleInstallClick = async () => {
                if (isIOS) {
                    setShowIosInstruction(true);
                } else if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        onSkip();
                    }
                    setDeferredPrompt(null);
                } else {
                    onSkip();
                }
            };

            return (
                <div className="min-h-screen bg-slate-100 dark:bg-slate-900 flex flex-col items-center justify-center p-4">
                    <div className="w-full max-w-sm bg-white dark:bg-slate-800 rounded-2xl shadow-xl overflow-hidden animate-in fade-in zoom-in duration-500 relative border border-slate-200 dark:border-slate-700">
                        <div className="pt-10 pb-6 flex flex-col items-center bg-gradient-to-b from-blue-50 dark:from-blue-900/20 to-white dark:to-slate-800 relative">
                            <button type="button" onClick={onSkip} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 font-medium text-sm">ข้าม</button>
                            <img src="https://cdn-icons-png.flaticon.com/512/709/709790.png" alt="App Mascot" className="w-40 h-40 object-contain drop-shadow-lg animate-float" />
                        </div>
                        <div className="px-6 pb-10 text-center">
                            <h1 className="text-2xl font-bold text-slate-800 dark:text-white mb-2 leading-tight">Transport<br/>Management App</h1>
                            <button type="button" onClick={handleInstallClick} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-lg py-3.5 rounded-xl shadow-[0_4px_14px_0_rgba(37,99,235,0.39)] transition-all active:scale-95 mt-6 mb-4">Install</button>
                            <p className="text-slate-500 dark:text-slate-400 text-sm">We'll also create a shortcut</p>
                        </div>
                        {showIosInstruction && (
                            <div className="absolute inset-0 bg-black/80 flex items-center justify-center p-6 z-50 animate-in fade-in">
                                <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl text-center w-full relative border border-slate-700">
                                    <button type="button" onClick={() => setShowIosInstruction(false)} className="absolute top-3 right-3 text-slate-400"><X size={20}/></button>
                                    <h3 className="font-bold text-lg mb-4 text-slate-800 dark:text-white">วิธีการติดตั้งบน iPhone</h3>
                                    <div className="text-left text-slate-600 dark:text-slate-300 space-y-4 text-sm">
                                        <p className="flex items-center gap-3"><span className="bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-400 p-2 rounded-lg"><Share size={18}/></span> <b>1.</b> แตะไอคอนแชร์ที่เมนูด้านล่าง</p>
                                        <p className="flex items-center gap-3"><span className="bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-400 p-2 rounded-lg"><PlusCircle size={18}/></span> <b>2.</b> เลื่อนเมนูขึ้นและเลือก "เพิ่มไปยังหน้าจอโฮม"</p>
                                        <p className="flex items-center gap-3"><span className="bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-400 p-2 rounded-lg"><CheckCircle size={18}/></span> <b>3.</b> แตะ "เพิ่ม" ที่มุมขวาบน</p>
                                    </div>
                                    <button type="button" onClick={onSkip} className="mt-6 w-full py-3 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-white font-bold rounded-xl hover:bg-slate-200 dark:hover:bg-slate-600">เข้าใช้งานผ่านเว็บแทน</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- COMPONENTS ---

        const QRScannerModal = ({ isOpen, onClose, onScanSuccess, expectedLocation }) => {
            const [error, setError] = useState('');
            const [step, setStep] = useState('scan'); 
            const [pallets, setPallets] = useState('');
            const scannerRef = useRef(null);

            useEffect(() => { 
                if (isOpen) {
                    setError('');
                    setStep('scan'); 
                    setPallets(''); 
                }
            }, [isOpen]);

            useEffect(() => {
                if (isOpen && step === 'scan') {
                    setTimeout(() => {
                        const html5QrCode = new window.Html5Qrcode("qr-reader");
                        scannerRef.current = html5QrCode;

                        html5QrCode.start(
                            { facingMode: "environment" },
                            { fps: 10, qrbox: { width: 250, height: 250 } },
                            (decodedText) => {
                                if (decodedText === expectedLocation || decodedText.includes(expectedLocation)) {
                                    if (scannerRef.current) {
                                        scannerRef.current.stop().then(() => {
                                            scannerRef.current.clear();
                                            setStep('input_pallets'); 
                                        }).catch(err => console.error(err));
                                    }
                                } else {
                                    setError(`❌ สแกนผิดจุด!\nระบบต้องการป้าย: "${expectedLocation}"`);
                                }
                            },
                            (errorMessage) => { }
                        ).catch((err) => {
                            setError("❌ ไม่สามารถเปิดกล้องได้ กรุณาตรวจสอบสิทธิ์กล้อง (Camera Permission)");
                        });
                    }, 100);
                }

                return () => {
                    if (scannerRef.current && scannerRef.current.isScanning) {
                        scannerRef.current.stop().then(() => scannerRef.current.clear()).catch(console.error);
                    }
                };
            }, [isOpen, step, expectedLocation]);

            const handleConfirmPallets = () => {
                if (pallets === '' || Number(pallets) < 0) {
                    setError('กรุณาระบุจำนวนพาเลทให้ถูกต้อง');
                    return;
                }
                setError('');
                setStep('success'); 
                setTimeout(() => onScanSuccess(Number(pallets)), 1000);
            };

            const handleCloseModal = () => {
                if (scannerRef.current && scannerRef.current.isScanning) {
                    scannerRef.current.stop().then(() => {
                        scannerRef.current.clear();
                        onClose();
                    }).catch(() => onClose());
                } else {
                    onClose();
                }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-[#0B1121] bg-opacity-95 z-50 flex flex-col items-center justify-center p-4 animate-in fade-in duration-200">
                    <div className="w-full max-w-sm bg-[#1A2235] rounded-2xl overflow-hidden relative border border-slate-700 shadow-2xl flex flex-col">
                        <div className="p-4 flex justify-between items-center z-10 border-b border-slate-700/50">
                            <span className="text-white font-semibold flex items-center gap-2">
                                <CameraIcon size={20} className="text-blue-400"/> สแกน QR Code เพื่อจบงาน
                            </span>
                            <button type="button" onClick={handleCloseModal} className="text-slate-400 hover:text-white p-1 rounded-full transition-colors"><X size={24} /></button>
                        </div>

                        <div className="relative flex flex-col items-center justify-center pt-8 pb-8 px-6 flex-1 min-h-[350px]">
                            
                            <div className={`w-full flex-col items-center ${step === 'scan' ? 'flex' : 'hidden'}`}>
                                <div id="qr-reader" className="w-full max-w-sm rounded-xl overflow-hidden mb-4 border border-slate-700 bg-black min-h-[250px]"></div>
                                <p className="text-slate-400 text-sm mb-1">จุดส่งสินค้าที่คุณต้องสแกนคือ:</p>
                                <h3 className="text-blue-400 font-bold text-3xl tracking-wide">{expectedLocation}</h3>
                            </div>

                            {step === 'success' && (
                                <div className="flex flex-col items-center animate-in zoom-in duration-300">
                                    <div className="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-4 shadow-[0_0_30px_rgba(34,197,94,0.4)]">
                                        <CheckCircle size={40} color="white" />
                                    </div>
                                    <h3 className="text-white font-bold text-xl">บันทึกสำเร็จ!</h3>
                                    <p className="text-green-400 text-sm mt-1">กำลังบันทึกข้อมูลและปิดงาน...</p>
                                </div>
                            )}

                            {step === 'input_pallets' && (
                                <div className="w-full flex flex-col items-center animate-in slide-in-from-right-4 duration-300">
                                    <div className="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center mb-4">
                                        <CheckCircle size={32} className="text-blue-400" />
                                    </div>
                                    <h3 className="text-white font-bold text-2xl mb-2">ระบุจำนวนพาเลท</h3>
                                    <p className="text-slate-400 text-sm mb-6 text-center">คุณรับสินค้ามาทั้งหมดกี่พาเลทในเที่ยวนี้?</p>
                                    
                                    <input 
                                        type="number" 
                                        min="0"
                                        value={pallets}
                                        onChange={(e) => setPallets(e.target.value)}
                                        className="w-32 text-center text-4xl font-bold bg-[#0B1121] text-white border-2 border-slate-600 rounded-2xl py-4 outline-none focus:border-blue-500 mb-6 transition-colors"
                                        placeholder="0"
                                        autoFocus
                                    />
                                    <button 
                                        type="button"
                                        onClick={handleConfirmPallets}
                                        className="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-bold text-lg shadow-[0_4px_20px_0_rgba(37,99,235,0.4)] flex items-center justify-center gap-2 transition-all active:scale-95"
                                    >
                                        <Save size={20} />
                                        ยืนยันและจบงาน
                                    </button>
                                </div>
                            )}

                            {error && step === 'scan' && (
                                <div className="mt-6 w-full bg-red-900/50 text-red-200 p-3 rounded-xl border border-red-800 text-sm text-center animate-in slide-in-from-bottom-2">
                                    <span className="leading-relaxed whitespace-pre-line">{error}</span>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const LoginScreen = ({ users, onLogin, refreshData }) => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [isResetMode, setIsResetMode] = useState(false);
            const [resetUsername, setResetUsername] = useState('');
            const [oldPassword, setOldPassword] = useState(''); 
            const [newPassword, setNewPassword] = useState('');
            const [isResetting, setIsResetting] = useState(false);
            const [resetMsg, setResetMsg] = useState({ type: '', text: '' });

            const handleLogin = (e) => {
                e.preventDefault();
                if (!users || users.length === 0) {
                    setError('กำลังโหลดข้อมูล Database กรุณารอสักครู่'); return;
                }
                const user = users.find(u => String(u.username) === String(username) && String(u.password) === String(password));
                if (user) { setError(''); onLogin(user); } else { setError('ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง'); }
            };

            const handleResetPassword = (e) => {
                e.preventDefault();
                const userValid = users.find(u => String(u.username) === String(resetUsername) && String(u.password) === String(oldPassword));
                if (!userValid) { setResetMsg({ type: 'error', text: 'ชื่อผู้ใช้งานหรือรหัสผ่านเดิมไม่ถูกต้อง' }); return; }

                setIsResetting(true);
                setResetMsg({ type: 'info', text: 'กำลังดำเนินการ...' });
                
                callAPI('resetUserPassword', { username: resetUsername, newPassword })
                    .then(res => {
                        setIsResetting(false);
                        if (res && res.success) {
                            setResetMsg({ type: 'success', text: 'เปลี่ยนรหัสผ่านสำเร็จ' });
                            refreshData();
                            setTimeout(() => { setIsResetMode(false); setResetMsg({ type: '', text: '' }); setResetUsername(''); setOldPassword(''); setNewPassword(''); }, 2500);
                        } else {
                            setResetMsg({ type: 'error', text: res ? res.message : 'เกิดข้อผิดพลาด' });
                        }
                    })
                    .catch(err => {
                        setIsResetting(false);
                        setResetMsg({ type: 'error', text: 'เกิดข้อผิดพลาดในการเชื่อมต่อ API' });
                    });
            };

            if (isResetMode) {
                return (
                    <div className="min-h-screen bg-slate-50 dark:bg-slate-900 flex items-center justify-center p-4">
                        <Card className="w-full max-w-md space-y-6">
                            <div className="text-center">
                                <div className="bg-blue-100 dark:bg-blue-900/30 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><Lock size={32} className="text-blue-600 dark:text-blue-400"/></div>
                                <h1 className="text-2xl font-bold text-slate-800 dark:text-white">เปลี่ยนรหัสผ่าน</h1>
                                <p className="text-slate-500 dark:text-slate-400 text-sm mt-1">กรุณากรอกข้อมูลเพื่อยืนยันตัวตนและตั้งรหัสผ่านใหม่</p>
                            </div>
                            <form onSubmit={handleResetPassword} className="space-y-4">
                                {resetMsg.text && (
                                    <div className={`p-3 text-sm rounded-lg flex items-center gap-2 ${resetMsg.type === 'success' ? 'bg-green-50 text-green-700' : resetMsg.type === 'error' ? 'bg-red-50 text-red-600' : 'bg-blue-50 text-blue-600'}`}>
                                        {resetMsg.type === 'success' ? <CheckCircle size={16}/> : resetMsg.type === 'error' ? <AlertCircle size={16}/> : <Clock size={16}/>} {resetMsg.text}
                                    </div>
                                )}
                                <div className="space-y-1"><label className="text-sm font-medium text-slate-700 dark:text-slate-300">ชื่อผู้ใช้งาน</label><input type="text" value={resetUsername} onChange={(e) => setResetUsername(e.target.value)} className="w-full px-4 py-2 border rounded-lg outline-none bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" required disabled={isResetting} /></div>
                                <div className="space-y-1"><label className="text-sm font-medium text-slate-700 dark:text-slate-300">รหัสผ่านเดิม</label><input type="password" value={oldPassword} onChange={(e) => setOldPassword(e.target.value)} className="w-full px-4 py-2 border rounded-lg outline-none bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" required disabled={isResetting} /></div>
                                <div className="space-y-1"><label className="text-sm font-medium text-slate-700 dark:text-slate-300">รหัสผ่านใหม่</label><input type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} className="w-full px-4 py-2 border rounded-lg outline-none bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" required disabled={isResetting} minLength="3" /></div>
                                <button type="submit" className="w-full bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 font-medium shadow-sm mt-2 flex justify-center items-center gap-2" disabled={isResetting}>{isResetting ? <span className="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span> : <Save size={18}/>} ยืนยัน</button>
                                <button type="button" onClick={() => { setIsResetMode(false); setResetMsg({ type: '', text: '' }); }} className="w-full bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-2.5 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-600 font-medium mt-2" disabled={isResetting}>ยกเลิก</button>
                            </form>
                        </Card>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-slate-900 flex items-center justify-center p-4">
                    <Card className="w-full max-w-md space-y-8">
                        <div className="text-center">
                            <div className="bg-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><Truck size={32} color="white"/></div>
                            <h1 className="text-2xl font-bold text-slate-800 dark:text-white">เข้าสู่ระบบ</h1>
                            <p className="text-slate-500 dark:text-slate-400 text-sm mt-1">ระบบเรียกรถขนส่ง</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4">
                            {error && <div className="p-3 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-300 text-sm rounded-lg flex items-center gap-2"><AlertCircle size={16} />{error}</div>}
                            <div className="space-y-1">
                                <label className="text-sm font-medium text-slate-700 dark:text-slate-300">ชื่อผู้ใช้งาน</label>
                                <div className="relative">
                                    <div className="absolute left-3 top-2.5 text-slate-400"><User size={18} /></div>
                                    <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full pl-10 pr-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" required />
                                </div>
                            </div>
                            <div className="space-y-1">
                                <label className="text-sm font-medium text-slate-700 dark:text-slate-300">รหัสผ่าน</label>
                                <div className="relative">
                                    <div className="absolute left-3 top-2.5 text-slate-400"><Lock size={18} /></div>
                                    <input type={showPassword ? "text" : "password"} value={password} onChange={(e) => setPassword(e.target.value)} className="w-full pl-10 pr-10 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" required />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-2.5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300"><EyeOff size={18} /></button>
                                </div>
                            </div>
                            <button type="submit" className="w-full bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 font-medium shadow-sm mt-2" disabled={!users || users.length === 0}>
                                {(!users || users.length === 0) ? 'กำลังเชื่อมต่อ Database...' : 'เข้าสู่ระบบ'}
                            </button>
                            <div className="text-center pt-2"><button type="button" onClick={() => setIsResetMode(true)} className="text-sm text-blue-600 dark:text-blue-400 hover:text-blue-800 hover:underline">เปลี่ยนรหัสผ่าน?</button></div>
                        </form>
                    </Card>
                </div>
            );
        };

        const RequesterDashboard = ({ requests, onCreateRequest, currentUserId, currentUser, locations }) => {
            const [showForm, setShowForm] = useState(false);
            const [formData, setFormData] = useState({ pickup: '', dropoff: '', date: '', tripsNeeded: 1, pallets: '', note: '' });

            useEffect(() => {
                if (locations.length > 0 && !formData.pickup) {
                    setFormData(prev => ({...prev, pickup: locations[0]?.name||'', dropoff: locations[1]?.name||locations[0]?.name||''}));
                }
            }, [locations]);

            const handleSubmit = (e) => { 
                e.preventDefault(); 
                onCreateRequest(formData); 
                setShowForm(false); 
                setFormData({ ...formData, note: '', pallets: '' }); 
            };
            
            const myRequests = (requests || []).filter(r => 
                r && (String(r.requesterId) === String(currentUserId) || String(r.requesterName) === String(currentUser.name)) && r.status !== 'completed'
            );
            
            const today = new Date().toISOString().split('T')[0];

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center"><h2 className="text-xl font-bold text-slate-800 dark:text-white">รายการคำขอของฉัน</h2><button type="button" onClick={() => setShowForm(!showForm)} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-2 hover:bg-blue-700"><PlusCircle size={16}/> สร้างคำขอ</button></div>
                    {showForm && (
                        <Card><form onSubmit={handleSubmit} className="space-y-4">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label className="text-sm font-medium text-slate-600 dark:text-slate-300">รับ</label><select required className="w-full p-2 border rounded-lg outline-none mt-1 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={formData.pickup} onChange={e=>setFormData({...formData, pickup: e.target.value})}>{locations.map(l=><option key={l.id}>{l.name}</option>)}</select></div>
                                <div><label className="text-sm font-medium text-slate-600 dark:text-slate-300">ส่ง</label><select required className="w-full p-2 border rounded-lg outline-none mt-1 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={formData.dropoff} onChange={e=>setFormData({...formData, dropoff: e.target.value})}>{locations.map(l=><option key={l.id}>{l.name}</option>)}</select></div>
                                <div><label className="text-sm font-medium text-slate-600 dark:text-slate-300">วันที่</label><input required type="date" min={today} className="w-full p-2 border rounded-lg outline-none mt-1 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={formData.date} onChange={e=>setFormData({...formData, date: e.target.value})} /></div>
                                
                                <div className="flex gap-4">
                                    <div className="flex-1"><label className="text-sm font-medium text-slate-600 dark:text-slate-300">จำนวนเที่ยว</label><input required type="number" min="1" max="10" className="w-full p-2 border rounded-lg outline-none mt-1 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={formData.tripsNeeded} onChange={e=>setFormData({...formData, tripsNeeded: parseInt(e.target.value)})} /></div>
                                    <div className="flex-1"><label className="text-sm font-medium text-slate-600 dark:text-slate-300">จำนวนพาเลท (รวม)</label><input required type="number" min="1" className="w-full p-2 border rounded-lg outline-none mt-1 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={formData.pallets} onChange={e=>setFormData({...formData, pallets: parseInt(e.target.value) || ''})} placeholder="ระบุจำนวน" /></div>
                                </div>
                            </div>
                            <div className="mt-4">
                                <label className="text-sm font-medium text-slate-600 dark:text-slate-300">หมายเหตุ (ระบุเพิ่มเติม)</label>
                                <input type="text" className="w-full p-2 border rounded-lg mt-1 outline-none bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={formData.note} onChange={e=>setFormData({...formData, note: e.target.value})} placeholder="เช่น ติดต่อคุณ A, ระวังสินค้าแตกหัก" />
                            </div>
                            <div className="flex justify-end gap-2 mt-4"><button type="button" onClick={()=>setShowForm(false)} className="px-4 py-2 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg">ยกเลิก</button><button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">ยืนยัน</button></div>
                        </form></Card>
                    )}
                    <div className="grid gap-4">
                        {myRequests.length === 0 ? (
                            <div className="text-center py-10 text-slate-400 dark:text-slate-500 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-lg">ไม่มีรายการคำขอค้างอยู่</div>
                        ) : myRequests.map(req => {

                                                    })()}
                                                </div>

                                        </div>
                                    </div>
                                </div>
                            </Card>

        const DriverDashboard = ({ requests, currentUser, onAcceptTrip, onUpdateTripStatus }) => {

            const myRequests = (requests || []).filter(r => r && r.status !== 'completed' && r.trips && r.trips.some(t => String(t.driverId) === String(currentUser.id) && t.status !== 'finished') && r.status !== 'cancelled');

            const handleScanSuccess = (pallets) => {
                if (scanData.reqId && scanData.tripId) {

                            <Bell size={16}/> งานว่าง

                                        <div className="flex items-center gap-2 mb-1">

                                            <span className="text-slate-700 dark:text-slate-300">เที่ยวที่ {i+1}</span>
                                            <button type="button" onClick={() => onAcceptTrip(req.id, trip.id)} className="bg-slate-800 dark:bg-slate-700 text-white px-3 py-1.5 rounded font-medium hover:bg-slate-700 dark:hover:bg-slate-600">รับงานนี้</button>
                                        </div>
                                    ))}</div>
                                </Card>
                            ))}

                    {activeTab === 'my-jobs' && (

                                    <Card key={req.id} className="border-blue-200 dark:border-blue-800">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <div className="font-bold text-lg text-slate-800 dark:text-slate-100">{req.pickup} → {req.dropoff}</div>
                                                <div className="text-sm text-slate-500 dark:text-slate-400 mt-1">
                                                    วันที่: {req.date}
                                                    {displayAcceptedTime && <span className="ml-2 text-blue-600 dark:text-blue-400 font-medium">(รับงาน {displayAcceptedTime} น.)</span>}
                                                </div>
                                                {req.pallets > 0 && <div className="text-sm text-slate-600 dark:text-slate-300 mt-1">จำนวนรวม: {req.pallets} พาเลท</div>}

                                            </div>
                                            <StatusBadge status={req.status} />
                                        </div>
                                        <div className="space-y-2 mt-4">{(req.trips||[]).filter(t=>String(t.driverId)===String(currentUser.id) && t.status!=='finished').map((trip, i) => (<div key={trip.id} className="flex justify-between items-center bg-blue-50 dark:bg-blue-900/30 border border-blue-200 dark:border-blue-800 p-3 rounded-lg"><div><div className="font-medium text-blue-800 dark:text-blue-400">เที่ยวของคุณ</div><div className="text-xs text-slate-500 dark:text-slate-400 mt-1">สถานะ: <span className="font-medium capitalize">{trip.status}</span> {trip.startTime && `• เริ่ม: ${trip.startTime} น.`}</div></div><div className="flex gap-2">{trip.status === 'waiting' && <button type="button" onClick={()=>onUpdateTripStatus(req.id, trip.id, 'start')} className="bg-blue-600 text-white px-3 py-2 rounded shadow-sm text-sm flex items-center gap-1"><Play size={14}/> เริ่มเดินทาง</button>}{trip.status === 'ongoing' && <button type="button" onClick={()=>{setScanData({reqId:req.id, tripId:trip.id, targetLocation:req.dropoff}); setShowScanner(true);}} className="bg-indigo-600 text-white px-3 py-2 rounded shadow-sm text-sm flex items-center gap-1"><Camera size={14}/> สแกนจบงาน</button>}</div></div>))}</div>
                                    </Card>
                                )
                            })}
                        </div>
                    )}
                </div>
            );
        };

        const AdminUserManagement = ({ users, setUsers, onRefresh }) => {
            const [isEditing, setIsEditing] = useState(null);
            const [formData, setFormData] = useState({ name: '', username: '', password: '', role: 'requester' });
            const [isAdding, setIsAdding] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);

            const resetForm = () => { setFormData({ name: '', username: '', password: '', role: 'requester' }); setIsEditing(null); setIsAdding(false); };
            
            const handleSave = (e) => {
                e.preventDefault();
                setIsProcessing(true);
                const userData = { ...formData, isEdit: !!isEditing, id: isEditing || Date.now() };
                
                callAPI('saveUser', { userData })
                    .then(res => {
                        if(res && res.success) {
                            onRefresh(); 
                            resetForm();
                        } else {
                            alert('เกิดข้อผิดพลาดในการบันทึกผู้ใช้: ' + (res?.message || ''));

                    })
                    .finally(() => setIsProcessing(false));
            };

            const handleDelete = (id) => {
                if(window.confirm('ยืนยันการลบผู้ใช้งานนี้?')) {
                    callAPI('deleteUser', { userId: id })
                        .then(res => {
                            if(res && res.success) onRefresh();
                            else alert('เกิดข้อผิดพลาดในการลบผู้ใช้');
                        });
                }
            };

            return (
                <div className="space-y-6">

                    {(isAdding || isEditing) && (
                        <Card className="bg-slate-50 dark:bg-slate-800 border-blue-200 dark:border-slate-700 animate-in fade-in duration-200">

                              <div><label className="text-xs text-slate-600 dark:text-slate-400">ชื่อ-นามสกุล</label><input required className="w-full p-2 border rounded outline-none bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} disabled={isProcessing} /></div>

                              <div><label className="text-xs text-slate-600 dark:text-slate-400">Username</label><input required className="w-full p-2 border rounded outline-none bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={formData.username} onChange={e=>setFormData({...formData, username: e.target.value})} disabled={isProcessing} /></div>
                              <div><label className="text-xs text-slate-600 dark:text-slate-400">Password</label><input required className="w-full p-2 border rounded outline-none bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={formData.password} onChange={e=>setFormData({...formData, password: e.target.value})} disabled={isProcessing} /></div>
                              <div className="md:col-span-2 flex gap-2 justify-end mt-2"><button type="button" onClick={resetForm} className="px-4 py-2 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300 rounded" disabled={isProcessing}>ยกเลิก</button><button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded flex items-center gap-2" disabled={isProcessing}>{isProcessing ? 'กำลังบันทึก...' : <><Save size={16}/> บันทึก</>}</button></div>
                           </form>
                        </Card>
                    )}
                    <div className="bg-white dark:bg-slate-800 rounded-lg border dark:border-slate-700 overflow-hidden"><table className="w-full text-sm text-left"><thead className="bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300"><tr><th className="p-3">ชื่อ</th><th className="p-3">Username</th><th className="p-3">Role</th><th className="p-3 text-right">Actions</th></tr></thead><tbody className="divide-y divide-slate-200 dark:divide-slate-700">{users.map(u => (<tr key={u.id} className="hover:bg-slate-50 dark:hover:bg-slate-700/50 text-slate-700 dark:text-slate-300"><td className="p-3 font-medium">{u.name}</td><td className="p-3 text-slate-500 dark:text-slate-400">{u.username}</td><td className="p-3"><span className="bg-gray-100 dark:bg-gray-600 px-2 py-1 rounded text-xs">{u.role}</span></td><td className="p-3 text-right flex justify-end gap-2"><button type="button" onClick={() => {setFormData(u); setIsEditing(u.id); setIsAdding(false);}} className="text-blue-600 dark:text-blue-400 p-1"><Edit size={16}/></button><button type="button" onClick={() => handleDelete(u.id)} className="text-red-600 dark:text-red-400 p-1"><Trash2 size={16}/></button></td></tr>))}</tbody></table></div>
                </div>
            );
        };

        const AdminLocationManagement = ({ locations, setLocations, onRefresh }) => {

            const [isProcessing, setIsProcessing] = useState(false);

                e.preventDefault(); 
                setIsProcessing(true);
                const locData = { name, isEdit: !!isEditing, id: isEditing || Date.now() };
                
                callAPI('saveLocation', { locData })
                    .then(res => {
                        if(res && res.success) {
                            onRefresh();
                            setName(''); setIsEditing(null); setIsAdding(false);
                        } else {
                            alert('เกิดข้อผิดพลาดในการบันทึกสถานที่');
                        }
                    })
                    .finally(() => setIsProcessing(false));
            };
            
            const handleDelete = (id) => {
                if(window.confirm('ยืนยันการลบสถานที่นี้?')) {
                    callAPI('deleteLocation', { locId: id })
                        .then(res => {
                            if(res && res.success) onRefresh();
                            else alert('เกิดข้อผิดพลาดในการลบสถานที่');
                        });
                }
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center"><h3 className="text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2"><MapIcon size={20} /> จัดการสถานที่</h3>{!isAdding && !isEditing && (<button type="button" onClick={() => setIsAdding(true)} className="bg-blue-600 text-white px-3 py-2 rounded-lg text-sm flex items-center gap-2"><PlusCircle size={16} /> เพิ่มสถานที่</button>)}</div>
                    {(isAdding || isEditing) && (
                        <Card className="bg-slate-50 dark:bg-slate-800 border-blue-200 dark:border-slate-700 animate-in fade-in duration-200">

                                <button type="button" onClick={() => { setIsAdding(false); setIsEditing(null); setName(''); }} className="px-4 py-2 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 rounded" disabled={isProcessing}>ยกเลิก</button>
                                <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded flex items-center gap-2" disabled={isProcessing}>{isProcessing ? 'บันทึก...' : <><Save size={16}/> บันทึก</>}</button>
                            </form>
                        </Card>
                    )}
                    <div className="bg-white dark:bg-slate-800 rounded-lg border dark:border-slate-700 overflow-hidden"><table className="w-full text-sm text-left"><thead className="bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300"><tr><th className="p-3">ชื่อสถานที่</th><th className="p-3 text-right">ลบ</th></tr></thead><tbody className="divide-y divide-slate-200 dark:divide-slate-700">{locations.map(loc => (<tr key={loc.id} className="hover:bg-slate-50 dark:hover:bg-slate-700/50 text-slate-700 dark:text-slate-300"><td className="p-3">{loc.name}</td><td className="p-3 text-right flex justify-end gap-2"><button type="button" onClick={() => {setName(loc.name); setIsEditing(loc.id); setIsAdding(false);}} className="text-blue-600 dark:text-blue-400 p-1"><Edit size={16}/></button><button type="button" onClick={() => handleDelete(loc.id)} className="text-red-600 dark:text-red-400 p-1"><Trash2 size={16}/></button></td></tr>))}</tbody></table></div>

            const [statusFilter, setStatusFilter] = useState('all');
            const [filterType, setFilterType] = useState('daily'); 
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));
            const [startDate, setStartDate] = useState(''); 
            const [endDate, setEndDate] = useState('');

            const today = new Date().toISOString().split('T')[0];

            useEffect(() => {
                if (locations && locations.length > 0 && !formData.pickup && !editId) {
                    setFormData(prev => ({...prev, pickup: locations[0]?.name||'', dropoff: locations[1]?.name||locations[0]?.name||''}));
                }
            }, [locations, editId]);

            const resetForm = () => {
                setFormData({ pickup: locations && locations.length > 0 ? locations[0]?.name||'' : '', dropoff: locations && locations.length > 1 ? locations[1]?.name||'' : (locations && locations.length > 0 ? locations[0]?.name||'' : ''), date: '', tripsNeeded: 1, pallets: '', note: '' });
                setIsFormOpen(false);
                setEditId(null);

                        .then(res => {
                            if (res && res.success) {
                                if (res.message) alert(res.message); 
                                onRefresh(); 
                            } else {
                                alert('เกิดข้อผิดพลาดในการแก้ไข: ' + (res?.message || 'Unknown error'));
                            }
                            resetForm();
                            setIsProcessing(false);
                        });
                } else {
                    onCreateRequest(formData);
                    resetForm();
                }
            };

            const handleEdit = (req) => {
                setFormData({ pickup: req.pickup, dropoff: req.dropoff, date: req.date, tripsNeeded: req.tripsNeeded, pallets: req.pallets || '', note: req.note || '' });
                setEditId(req.id);
                setIsFormOpen(false);
            };

            const handleDelete = (reqId) => {
                if(window.confirm('⚠️ ยืนยันการลบใบงานนี้?\n(ข้อมูลเที่ยววิ่งทั้งหมดที่เกี่ยวข้องจะถูกลบทิ้งอย่างถาวร)')) {
                    setRequests(requests.filter(r => r.id !== reqId)); 
                    callAPI('deleteRequest', { reqId })
                        .then(res => {
                            if(res && res.success) {
                                onRefresh(); 
                            } else {
                                alert('เกิดข้อผิดพลาดในการลบ');
                            }
                        });
                }
            };

            // 💡 แก้ปัญหาเด้งกลับ ด้วยการใส่ e.preventDefault() และ e.stopPropagation()
            const handleForceComplete = (e, reqId) => {
                e.preventDefault();
                e.stopPropagation();
                if(window.confirm('✅ ยืนยันการบังคับปิดใบงานนี้ให้เป็นสถานะ "เสร็จสิ้น"?\n(เที่ยวรถทั้งหมดที่ค้างอยู่จะถูกบันทึกว่าปิดงานโดย Admin)')) {
                    setRequests(requests.map(r => {
                        if (r.id === reqId) {
                            const now = new Date();
                            const timeString = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                            const updatedTrips = r.trips.map(t => ({ 
                                ...t, 
                                status: 'finished', 
                                driverName: 'Admin',
                                driverId: 'admin',
                                endTime: t.endTime || timeString
                            }));
                            return { ...r, status: 'completed', trips: updatedTrips, tripsCompleted: r.tripsNeeded };
                        }
                        return r;
                    }));
                    callAPI('updateRequestStatus', { reqId: reqId, status: 'completed' })
                        .then(() => onRefresh());
                }
            };

            const filteredLocalRequests = useMemo(() => {
                return (requests || []).filter(req => {
                    if (!req) return false;
                    const mStatus = statusFilter === 'all' || req.status === statusFilter;
                    const term = searchTerm.toLowerCase();
                    const mSearch = !term || 
                        String(req.id).includes(term) || 
                        (req.requesterName || '').toLowerCase().includes(term) || 
                        (req.pickup || '').toLowerCase().includes(term) || 
                        (req.dropoff || '').toLowerCase().includes(term);

                    let mDate = true;
                    if (filterType !== 'all') {
                        const tDate = req.date;
                        if (filterType === 'daily') mDate = tDate === selectedDate;
                        else if (filterType === 'monthly') mDate = tDate && tDate.startsWith(selectedMonth);
                        else if (filterType === 'range') {
                            if (startDate && endDate) mDate = tDate >= startDate && tDate <= endDate;
                        }
                    }
                    
                    return mStatus && mSearch && mDate;
                }).sort((a,b) => Number(b.id) - Number(a.id));
            }, [requests, searchTerm, statusFilter, filterType, selectedDate, selectedMonth, startDate, endDate]);

            const renderForm = (title) => (
                <div className="animate-in fade-in duration-300">
                    <h4 className="font-bold mb-4 text-blue-800 dark:text-blue-300">{title}</h4>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label className="text-sm font-medium text-slate-700 dark:text-slate-300">รับ</label><select required className="w-full p-2 border rounded outline-none bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={formData.pickup} onChange={e=>setFormData({...formData, pickup: e.target.value})}>{(locations || []).map(l=><option key={l.id}>{l.name}</option>)}</select></div>
                            <div><label className="text-sm font-medium text-slate-700 dark:text-slate-300">ส่ง</label><select required className="w-full p-2 border rounded outline-none bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={formData.dropoff} onChange={e=>setFormData({...formData, dropoff: e.target.value})}>{(locations || []).map(l=><option key={l.id}>{l.name}</option>)}</select></div>
                            <div><label className="text-sm font-medium text-slate-700 dark:text-slate-300">วันที่</label><input required type="date" className="w-full p-2 border rounded outline-none bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={formData.date} onChange={e=>setFormData({...formData, date: e.target.value})} /></div>
                            
                            <div className="flex gap-4">
                                <div className="flex-1">
                                    <label className="text-sm font-medium text-slate-700 dark:text-slate-300">จำนวนเที่ยว</label>
                                    <input required type="number" min="1" max="10" className="w-full p-2 border rounded outline-none bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={formData.tripsNeeded} onChange={e=>setFormData({...formData, tripsNeeded: parseInt(e.target.value)})} />
                                </div>
                                <div className="flex-1">
                                    <label className="text-sm font-medium text-slate-700 dark:text-slate-300">จำนวนพาเลท</label>
                                    <input required type="number" min="0" className="w-full p-2 border rounded outline-none bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={formData.pallets} onChange={e=>setFormData({...formData, pallets: parseInt(e.target.value) || ''})} placeholder="ระบุจำนวน" />
                                </div>
                            </div>
                        </div>
                        <div>
                            <label className="text-sm font-medium text-slate-700 dark:text-slate-300">หมายเหตุ</label>
                            <input type="text" className="w-full p-2 border rounded outline-none bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={formData.note} onChange={e=>setFormData({...formData, note: e.target.value})} placeholder="ระบุหมายเหตุ (ถ้ามี)" />
                        </div>
                        <div className="flex justify-end gap-2 pt-2">
                            <button type="button" onClick={resetForm} className="px-4 py-2 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300 rounded-lg hover:bg-slate-300 dark:hover:bg-slate-600">ยกเลิก</button>
                            <button type="submit" disabled={isProcessing} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-blue-400">
                                {isProcessing ? 'กำลังบันทึก...' : 'บันทึกข้อมูล'}
                            </button>
                        </div>
                    </form>
                </div>
            );

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h3 className="text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2"><ListIcon size={20} /> จัดการรายการเรียกรถ</h3>
                        {!isFormOpen && !editId && (
                            <button type="button" onClick={() => { resetForm(); setIsFormOpen(true); }} className="bg-blue-600 text-white px-3 py-2 rounded-lg text-sm flex items-center gap-2 shadow-sm">
                                <PlusCircle size={16}/> เพิ่มใบงาน
                            </button>
                        )}
                    </div>

                    {isFormOpen && !editId && (
                        <Card className="bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800">
                            {renderForm('📝 สร้างใบงานใหม่ (Admin)')}
                        </Card>
                    )}

                    {!isFormOpen && !editId && (
                        <div className="bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-4 rounded-xl flex flex-wrap items-end gap-4 mb-4 shadow-sm">
                            <div className="flex-1 min-w-[200px]">
                                <label className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 block">ค้นหาข้อมูล</label>
                                <div className="relative">
                                    <Search size={18} className="absolute left-3 top-2.5 text-slate-400" />
                                    <input type="text" placeholder="ค้นหา ID, ชื่อผู้ขอ, จุดรับ-ส่ง..." className="w-full pl-9 pr-3 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                </div>
                            </div>
                            <div className="w-full md:w-32">
                                <label className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 block">สถานะ</label>
                                <select className="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
                                    <option value="all">ทุกสถานะ</option>
                                    <option value="pending">รอคนรับงาน</option>
                                    <option value="assigned">มีคนรับแล้ว</option>
                                    <option value="in_progress">กำลังดำเนินการ</option>
                                    <option value="completed">เสร็จสิ้น</option>
                                </select>
                            </div>
                            <div className="w-full md:w-32">
                                <label className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 block">ช่วงเวลา</label>
                                <select className="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={filterType} onChange={e => setFilterType(e.target.value)}>
                                    <option value="daily">รายวัน</option>
                                    <option value="monthly">รายเดือน</option>
                                    <option value="range">ช่วงเวลา</option>
                                </select>
                            </div>
                            {filterType === 'daily' && (
                                <div className="w-full md:w-32">
                                    <label className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 block">เลือกวันที่</label>
                                    <input type="date" className="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} />
                                </div>
                            )}
                            {filterType === 'monthly' && (
                                <div className="w-full md:w-32">
                                    <label className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 block">เลือกเดือน</label>
                                    <input type="month" className="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)} />
                                </div>
                            )}
                            {filterType === 'range' && (<>
                                <div className="w-full md:w-32">
                                    <label className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 block">เริ่มต้น</label>
                                    <input type="date" className="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={startDate} onChange={e => setStartDate(e.target.value)} />
                                </div>
                                <div className="w-full md:w-32">
                                    <label className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 block">สิ้นสุด</label>
                                    <input type="date" className="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={endDate} onChange={e => setEndDate(e.target.value)} />
                                </div>
                            </>)}
                        </div>
                    )}

                    <div className="grid gap-4">
                        {filteredLocalRequests.length === 0 ? <p className="text-center text-slate-400 dark:text-slate-500 py-8 bg-white dark:bg-slate-800 rounded-xl border border-dashed dark:border-slate-700">ไม่พบรายการคำขอ</p> : null}
                        {filteredLocalRequests.map(req => (
                            <Card key={req.id} className={editId === req.id ? "ring-2 ring-blue-400 border-transparent shadow-lg bg-blue-50/10" : ""}>
                                {editId === req.id ? (
                                    renderForm(`✏️ แก้ไขใบงาน #${req.id}`)
                                ) : (
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                        <div className="flex-1">
                                            <div className="flex gap-2 items-center"><span className="text-xs bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-2 rounded font-mono">#{req.id}</span> <StatusBadge status={req.status}/></div>
                                            <div className="font-bold mt-2 text-slate-800 dark:text-slate-100 flex items-center gap-1 text-lg"><MapPin size={18} className="text-blue-500"/> {req.pickup} <span className="text-slate-300 dark:text-slate-600 mx-1">→</span> <MapPin size={18} className="text-green-500"/> {req.dropoff}</div>
                                            <div className="text-sm text-slate-500 dark:text-slate-400 mt-2">ผู้ขอ: {req.requesterName} • วันที่: {req.date}</div>
                                            
                                            <div className="mt-3 flex items-start gap-2 bg-slate-50 dark:bg-slate-700/50 p-2.5 rounded-lg border border-slate-100 dark:border-slate-700">
                                                <Truck size={16} className="text-blue-500 mt-0.5" />
                                                <div className="flex flex-col gap-1.5">
