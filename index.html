                                                    <span className="text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wide">คนขับที่รับงานแล้ว</span>
                                                    <div className="flex flex-wrap gap-1.5">
                                                        {(() => {
                                                            const drivers = [...new Set((req.trips || []).filter(t => t.driverName && t.driverId !== 'admin').map(t => t.driverName))];
                                                            if (drivers.length === 0) return <span className="text-[11px] text-amber-600 dark:text-amber-400 font-medium bg-amber-50 dark:bg-amber-900/30 px-2 py-0.5 rounded border border-amber-200 dark:border-amber-800">รอคนรับงาน</span>;
                                                            return drivers.map((d, i) => (
                                                                <span key={i} className="bg-blue-100 dark:bg-blue-900/30 text-blue-800 dark:text-blue-300 border border-blue-200 dark:border-blue-800 px-2 py-0.5 rounded text-xs font-semibold">{d}</span>
                                                            ));
                                                        })()}
                                                    </div>
                                                </div>
                                            </div>

                                        </div>
                                        <div className="flex items-center gap-2 self-end md:self-auto border-t dark:border-slate-700 md:border-none pt-3 md:pt-0 w-full md:w-auto justify-end mt-2 md:mt-0">
                                            {req.status !== 'completed' && (
                                                <button type="button" onClick={(e) => handleForceComplete(e, req.id)} className="text-xs bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400 hover:bg-green-100 dark:hover:bg-green-900/50 px-3 py-2 rounded-lg font-medium border border-green-200 dark:border-green-800 shadow-sm transition-colors">
                                                    <CheckCircle size={14} className="inline mr-1 mb-0.5"/> ปิดงาน
                                                </button>
                                            )}
                                            <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); handleEdit(req); }} className="text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 p-2 bg-slate-50 dark:bg-slate-700 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-lg transition-colors"><Edit size={16}/></button>
                                            <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); handleDelete(req.id); }} className="text-slate-500 dark:text-slate-400 hover:text-red-600 dark:hover:text-red-400 p-2 bg-slate-50 dark:bg-slate-700 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg transition-colors"><Trash2 size={16}/></button>
                                        </div>
                                    </div>
                                )}
                            </Card>
                        ))}
                    </div>
                </div>
            );
        };

        const AdminDashboard = ({ requests, setRequests, users, setUsers, locations, setLocations, onCreateRequest, onRefresh }) => {
            const [activeTab, setActiveTab] = useState(() => localStorage.getItem('adminActiveTab') || 'stats');
            const [filterType, setFilterType] = useState('daily'); 
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));
            const [startDate, setStartDate] = useState(''); 
            const [endDate, setEndDate] = useState('');     
            const [selectedDriver, setSelectedDriver] = useState('all');

            useEffect(() => {
                localStorage.setItem('adminActiveTab', activeTab);
            }, [activeTab]);

            // 💡 ระบบ Drag and Drop
            const defaultWidgets = ['dailyVolume', 'userPerformance', 'waitingVolume', 'pickupLoc', 'dropoffLoc', 'reqPie', 'compPie', 'ongoingTrips'];
            const [widgetOrder, setWidgetOrder] = useState(() => {
                const savedOrder = localStorage.getItem('adminWidgetOrder');
                if (savedOrder) {
                    const parsed = JSON.parse(savedOrder);
                    defaultWidgets.forEach(w => { if (!parsed.includes(w)) parsed.push(w); });
                    return parsed;
                }
                return defaultWidgets;
            });
            const dragItem = useRef(null);
            const dragOverItem = useRef(null);

            const handleSort = () => {
                if (dragItem.current === null || dragOverItem.current === null) return;
                let _widgetOrder = [...widgetOrder];
                const draggedItemContent = _widgetOrder.splice(dragItem.current, 1)[0];
                _widgetOrder.splice(dragOverItem.current, 0, draggedItemContent);
                dragItem.current = null;
                dragOverItem.current = null;
                setWidgetOrder(_widgetOrder);
                localStorage.setItem('adminWidgetOrder', JSON.stringify(_widgetOrder));
            };

            // 💡 3. ระบบย่อ/ขยายกล่อง Dashboard
            const [widgetSizes, setWidgetSizes] = useState(() => {
                const saved = localStorage.getItem('adminWidgetSizes');
                return saved ? JSON.parse(saved) : { ongoingTrips: 2, userPerformance: 2 };
            });

            const toggleSize = (id) => {
                setWidgetSizes(prev => {
                    const current = prev[id] || (id === 'ongoingTrips' || id === 'userPerformance' ? 2 : 1);
                    const next = current >= 4 ? 1 : current + 1;
                    const updated = { ...prev, [id]: next };
                    localStorage.setItem('adminWidgetSizes', JSON.stringify(updated));
                    return updated;
                });
            };

            // แปลง Size ให้เป็น Class ของ Tailwind ที่สมบูรณ์
            const getColSpanClass = (size) => {
                switch(size) {
                    case 4: return 'col-span-1 md:col-span-2 xl:col-span-4';
                    case 3: return 'col-span-1 md:col-span-2 xl:col-span-3';
                    case 2: return 'col-span-1 md:col-span-2 xl:col-span-2';
                    case 1:
                    default: return 'col-span-1 md:col-span-1 xl:col-span-1';
                }
            };

            const driverUsers = (users || []).filter(u => u && u.role === 'driver').map(u => u.name);

            const filteredRequests = useMemo(() => {
                return (requests||[]).filter(req => {
                    if (!req) return false;
                    const hasValidTrip = (req.trips || []).some(trip => {
                        if (selectedDriver !== 'all' && String(trip.driverId) !== String(selectedDriver)) return false;
                        const tDate = trip.date || req.date;
                        if (filterType === 'daily') return tDate === selectedDate;
                        if (filterType === 'monthly') return tDate && tDate.startsWith(selectedMonth);
                        if (filterType === 'range') { 
                            if (!startDate || !endDate) return true; 
                            return tDate >= startDate && tDate <= endDate;
                        }
                        return true;
                    });
                    return hasValidTrip;
                });
            }, [requests, filterType, selectedDate, selectedMonth, startDate, endDate, selectedDriver]);

            let totalTrips = 0, completedTrips = 0, pendingTrips = 0, activeTrips = 0;

            filteredRequests.forEach(req => {
                if (req && req.trips) {
                    req.trips.forEach(trip => {
                        const tDate = trip.date || req.date;
                        if (selectedDriver !== 'all' && String(trip.driverId) !== String(selectedDriver)) return;
                        if (filterType === 'daily' && tDate !== selectedDate) return;
                        if (filterType === 'monthly' && (!tDate || !tDate.startsWith(selectedMonth))) return;
                        if (filterType === 'range' && startDate && endDate && (tDate < startDate || tDate > endDate)) return;
                        
                        totalTrips++;
                        if (trip.status === 'finished') completedTrips++;
                        else if (trip.status === 'ongoing') activeTrips++;
                        else pendingTrips++;
                    });
                }
            });

            const chart1Data = useMemo(() => {
                if (filterType === 'monthly') {
                    const year = selectedMonth.split('-')[0] || new Date().getFullYear().toString();
                    const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
                    const monthData = months.map(m => ({ label: m, total: 0, drivers: {} }));
                    
                    (requests||[]).forEach(req => {
                        (req.trips || []).forEach(trip => {
                            const tDate = trip.date || req.date;
                            if (selectedDriver !== 'all' && String(trip.driverId) !== String(selectedDriver)) return;
                            
                            if (tDate && tDate.startsWith(year) && trip.status === 'finished') {
                                const mIndex = parseInt(tDate.split('-')[1]) - 1;
                                monthData[mIndex].total += 1;
                                const dName = trip.driverName || 'Admin';
                                if (!monthData[mIndex].drivers[dName]) monthData[mIndex].drivers[dName] = 0;
                                monthData[mIndex].drivers[dName] += 1;
                            }
                        });
                    });
                    return { type: 'monthly', data: monthData };
                } else {
                    let start, end;
                    const today = new Date();
                    if (filterType === 'range' && startDate && endDate) {
                        start = new Date(startDate); end = new Date(endDate);
                    } else { 
                        start = new Date(selectedDate); end = new Date(selectedDate);
                    }
                    
                    const dateMap = {};
                    const dateArray = [];
                    const curr = new Date(start);
                    
                    if (curr > end || isNaN(curr.getTime())) {
                        const str = today.toISOString().split('T')[0];
                        dateMap[str] = { label: `${today.getDate()}/${today.getMonth() + 1}`, total: 0, drivers: {} };
                        dateArray.push(str);
                    } else {
                        while (curr <= end) {
                            const str = curr.toISOString().split('T')[0];
                            dateMap[str] = { label: `${curr.getDate()}/${curr.getMonth() + 1}`, total: 0, drivers: {} };
                            dateArray.push(str);
                            curr.setDate(curr.getDate() + 1);
                        }
                    }
                    
                    (requests||[]).forEach(req => {
                        (req.trips || []).forEach(trip => {
                            const tDate = trip.date || req.date;
                            if (selectedDriver !== 'all' && String(trip.driverId) !== String(selectedDriver)) return;
                            
                            if (trip.status === 'finished' && dateMap[tDate]) {
                                dateMap[tDate].total += 1;
                                const dName = trip.driverName || 'Admin';
                                if (!dateMap[tDate].drivers[dName]) dateMap[tDate].drivers[dName] = 0;
                                dateMap[tDate].drivers[dName] += 1;
                            }
                        });
                    });
                    return { type: 'daily', data: dateArray.map(d => dateMap[d]) };
                }
            }, [requests, filterType, selectedMonth, selectedDate, startDate, endDate, selectedDriver]);

            const maxChart1Scale = Math.max(...chart1Data.data.map(d => d.total), 1) * 1.15;

            // 💡 2. ข้อมูลสำหรับกราฟแท่งเปรียบเทียบผู้ร้องขอ (Requester) กับคนขับ (Driver)
            const userPerformanceData = useMemo(() => {
                const stats = {};
                (users || []).forEach(u => {
                    if (u.role === 'requester' || u.role === 'driver') {
                        stats[u.id] = { name: u.name, role: u.role, requested: 0, completed: 0 };
                    }
                });

                filteredRequests.forEach(req => {
                    if (stats[req.requesterId]) {
                        stats[req.requesterId].requested += Number(req.tripsNeeded || 0);
                    }
                    (req.trips || []).forEach(trip => {
                        if (trip.status === 'finished' && trip.driverId && stats[trip.driverId]) {
                            stats[trip.driverId].completed += 1;
                        }
                    });
                });

                return Object.values(stats)
                    .filter(s => s.requested > 0 || s.completed > 0)
                    .sort((a,b) => Math.max(b.requested, b.completed) - Math.max(a.requested, a.completed));
            }, [filteredRequests, users]);

            const validTripsList = useMemo(() => {
                let trips = [];
                filteredRequests.forEach(req => {
                    (req.trips || []).forEach(trip => {
                        if (selectedDriver !== 'all' && String(trip.driverId) !== String(selectedDriver)) return;
                        trips.push({ ...trip, reqDate: trip.date || req.date, reqPickup: req.pickup, reqDropoff: req.dropoff, requesterName: req.requesterName });
                    });
                });
                return trips;
            }, [filteredRequests, selectedDriver]);

            const activeDriversList = validTripsList.filter(t => t.status === 'ongoing');

            const pickupVolume = useMemo(() => {
                const locMap = {};
                validTripsList.forEach(t => {
                    if (t.status === 'finished') {
                        if (!locMap[t.reqPickup]) locMap[t.reqPickup] = { count: 0 };
                        locMap[t.reqPickup].count += 1;
                    }
                });
                return Object.keys(locMap).map(name => ({ name, count: locMap[name].count })).sort((a,b) => b.count - a.count);
            }, [validTripsList]);
            const maxVolumePickup = Math.max(...pickupVolume.map(d => d.count), 1);

            const locationVolume = useMemo(() => {
                const locMap = {};
                validTripsList.forEach(t => {
                    if (t.status === 'finished') {
                        if (!locMap[t.reqDropoff]) locMap[t.reqDropoff] = { count: 0 };
                        locMap[t.reqDropoff].count += 1;
                    }
                });
                return Object.keys(locMap).map(name => ({ name, count: locMap[name].count })).sort((a,b) => b.count - a.count);
            }, [validTripsList]);
            const maxVolumeLoc = Math.max(...locationVolume.map(d => d.count), 1);

            const requesterData = useMemo(() => {
                const reqMap = {};
                validTripsList.forEach(t => {
                    if (!reqMap[t.requesterName]) reqMap[t.requesterName] = 0;
                    reqMap[t.requesterName] += 1;
                });
                return Object.keys(reqMap).map(name => ({ name, value: reqMap[name] })).sort((a,b) => b.value - a.value);
            }, [validTripsList]);

            const waitingBarData = useMemo(() => {
                const locMap = {};
                filteredRequests.forEach(req => {
                    (req.trips || []).forEach(trip => {
                        const tDate = trip.date || req.date;
                        if (selectedDriver !== 'all' && String(trip.driverId) !== String(selectedDriver)) return;
                        if (filterType === 'daily' && tDate !== selectedDate) return;
                        if (filterType === 'monthly' && (!tDate || !tDate.startsWith(selectedMonth))) return;
                        if (filterType === 'range' && startDate && endDate && (tDate < startDate || tDate > endDate)) return;

                        if (trip.status === 'waiting') {
                            if (!locMap[req.pickup]) locMap[req.pickup] = { value: 0 };
                            locMap[req.pickup].value += 1;
                        }
                    });
                });
                return Object.keys(locMap).map(name => ({ name, value: locMap[name].value })).sort((a,b) => b.value - a.value);
            }, [filteredRequests, filterType, selectedDate, selectedMonth, startDate, endDate, selectedDriver]);

            const maxWaitingBarScale = Math.max(...waitingBarData.map(d => d.value), 1) * 1.15;

            const completionData = [
                { name: 'สำเร็จ', value: completedTrips },
                { name: 'ค้าง/รอรับ', value: pendingTrips + activeTrips }
            ].filter(d => d.value > 0);

            const handleExportRequests = () => {
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + "id,requester_id,requester_name,pickup,dropoff,date,trips_needed,status,note,created_at\n" + 
                    (requests||[]).map(r => `${r.id},${r.requesterId},${r.requesterName},"${r.pickup}","${r.dropoff}",${r.date},${r.tripsNeeded},${r.status},"${r.note || ''}",${r.createdAt}`).join("\n");
                
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Raw_Requests_Data.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const handleExportTrips = () => {
                const allTrips = (requests||[]).flatMap(r => (r.trips || []).map(t => ({...t, reqId: r.id, reqDate: r.date})));
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + "id,request_id,status,start_time,end_time,driver_id,driver_name,date,pallets\n" + 
                    allTrips.map(t => `${t.id},${t.reqId},${t.status},${t.startTime || ''},${t.endTime || ''},${t.driverId || ''},${t.driverName || ''},${t.date || t.reqDate || ''},${t.pallets || 0}`).join("\n");
                
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Raw_Trips_Data.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            // 💡 คอมโพเนนต์หัวข้อสำหรับกล่อง Dashboard ทุกอัน
            const WidgetHeader = ({ id, title, icon: Icon, colorClass }) => (
                <div className="flex justify-between items-start mb-6">
                    <h3 className={`font-semibold text-slate-700 dark:text-white flex items-center gap-2 cursor-grab active:cursor-grabbing hover:${colorClass.replace('text-', 'text-opacity-80 text-')} transition-colors`}>
                        <GripHorizontal size={18} className="text-slate-300" />
                        <Icon size={20} className={colorClass} /> {title}
                    </h3>
                    <button type="button" onClick={() => toggleSize(id)} className="p-1 hover:bg-slate-100 dark:hover:bg-slate-700 rounded text-slate-400 hover:text-blue-500 transition-colors" title="ปรับขนาดหน้าต่าง">
                        <Maximize size={16} />
                    </button>
                </div>
            );

            // 💡 1. กำหนดโครงสร้างการ์ดกราฟต่างๆ (Widgets) สำหรับระบบ Drag & Drop
            const widgets = {
                dailyVolume: (
                    <Card className="border-blue-100 dark:border-slate-700 flex flex-col h-full">
                        <WidgetHeader id="dailyVolume" title="ปริมาณงานรายวัน (สำเร็จ)" icon={BarChart2} colorClass="text-blue-500" />
                        <div className="h-64 flex items-end gap-6 overflow-x-auto pb-4 px-2 mt-2 scrollbar-thin scrollbar-thumb-slate-200">
                            {chart1Data.data.map((item, index) => {
                                return (
                                    <div key={index} className="flex-1 min-w-[max-content] h-full flex flex-col items-center gap-2 group">
                                        <div className="w-full flex-1 flex items-end justify-center gap-1 h-full">
                                            {chart1Data.type === 'monthly' ? (
                                                item.total > 0 && (
                                                    <div className="w-8 sm:w-10 relative flex flex-col justify-end items-center h-full" title={`รวมทั้งหมด: ${item.total} เที่ยว`}>
                                                        <div className="w-full bg-gradient-to-t from-blue-600 to-blue-400 rounded-t-sm shadow-sm transition-all flex justify-center items-start pt-1.5" style={{ height: `${Math.min(100, Math.max(0, (item.total / maxChart1Scale) * 100))}%`, minHeight: item.total > 0 ? '24px' : '0' }}>
                                                            <span className="text-white font-bold text-xs drop-shadow-md">{item.total}</span>
                                                        </div>
                                                    </div>
                                                )
                                            ) : (
                                                <>
                                                    {Object.entries(item.drivers).map(([dName, count], idx) => {
                                                        const dHeight = Math.min(100, Math.max(0, (count / maxChart1Scale) * 100));
                                                        return (
                                                            <div key={idx} className="w-5 sm:w-6 relative flex flex-col justify-end items-center h-full" title={`${dName}: ${count}`}>
                                                                <div className="w-full rounded-t-sm shadow-sm transition-all flex justify-center items-start pt-1.5" style={{ height: `${dHeight}%`, backgroundColor: getEntityColor(dName), minHeight: count > 0 ? '24px' : '0' }}>
                                                                    {count > 0 && <span className="text-white font-bold text-[10px] drop-shadow-md">{count}</span>}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                    {item.total > 0 && (
                                                        <div className="w-6 sm:w-8 relative flex flex-col justify-end items-center h-full ml-1" title={`Total: ${item.total}`}>
                                                            <div className="w-full bg-slate-700 dark:bg-slate-500 rounded-t-sm shadow-sm transition-all flex justify-center items-start pt-1.5" style={{ height: `${Math.min(100, Math.max(0, (item.total / maxChart1Scale) * 100))}%`, minHeight: item.total > 0 ? '24px' : '0' }}>
                                                                <span className="text-white font-bold text-[10px] drop-shadow-md">{item.total}</span>
                                                            </div>
                                                        </div>
                                                    )}
                                                </>
                                            )}
                                        </div>
                                        <div className="text-[11px] text-slate-500 dark:text-slate-400 font-bold whitespace-nowrap h-4">{item.label}</div>
                                    </div>
                                );
                            })}
                            {chart1Data.data.every(d => d.total === 0) && <div className="w-full h-full flex items-center justify-center text-slate-400 dark:text-slate-500 text-sm">ไม่มีข้อมูลในช่วงเวลานี้</div>}
                        </div>
                        <div className="flex flex-wrap gap-3 mt-4 pt-4 border-t dark:border-slate-700 px-2">
                            {chart1Data.type === 'monthly' ? (
                                <div className="flex items-center gap-1.5 text-[11px] font-bold bg-blue-50 dark:bg-blue-900/30 px-2 py-1 rounded border border-blue-200 dark:border-blue-800"><div className="w-2.5 h-2.5 rounded-sm bg-blue-500"></div><span className="text-blue-700 dark:text-blue-300">ยอดรวมของเดือน (Total)</span></div>
                            ) : (
                                <>
                                    {driverUsers.map(dName => {
                                        const hasJob = chart1Data.data.some(d => d.drivers[dName] > 0);
                                        if (!hasJob) return null;
                                        return (
                                            <div key={dName} className="flex items-center gap-1.5 text-[11px] font-medium bg-slate-50 dark:bg-slate-700/50 px-2 py-1 rounded border dark:border-slate-600">
                                                <div className="w-2.5 h-2.5 rounded-sm" style={{ backgroundColor: getEntityColor(dName) }}></div>
                                                <span className="text-slate-600 dark:text-slate-300">{dName}</span>
                                            </div>
                                        );
                                    })}
                                    {chart1Data.data.some(d => d.total > 0) && (
                                        <div className="flex items-center gap-1.5 text-[11px] font-bold bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded border border-slate-300 dark:border-slate-600 ml-1"><div className="w-2.5 h-2.5 rounded-sm bg-slate-700 dark:bg-slate-400"></div><span className="text-slate-700 dark:text-slate-200">Total</span></div>
                                    )}
                                </>
                            )}
                        </div>
                    </Card>
                ),
                // 💡 2. กราฟแท่งเปรียบเทียบผู้ร้องขอ กับ คนขับ (อยู่ในกราฟเดียวกันตามคำขอ)
                userPerformance: (
                    <Card className="border-blue-100 dark:border-slate-700 flex flex-col h-full">
                        <WidgetHeader id="userPerformance" title="สถิติผู้ใช้งาน (จำนวนเรียกรถ vs วิ่งงาน)" icon={UsersIcon} colorClass="text-purple-500" />
                        <div className="h-64 flex items-end gap-4 overflow-x-auto pb-4 px-2 mt-2 scrollbar-thin scrollbar-thumb-slate-200">
                            {userPerformanceData.map((user, index) => {
                                const maxVal = Math.max(...userPerformanceData.map(u => Math.max(u.requested, u.completed)), 1) * 1.15;
                                const val = user.role === 'requester' ? user.requested : user.completed;
                                const heightPct = Math.min(100, Math.max(0, (val / maxVal) * 100));
                                const bgColor = user.role === 'requester' ? '#a855f7' : '#22c55e'; // ม่วงสำหรับคนขอรถ, เขียวสำหรับคนขับ
                                return (
                                    <div key={index} className="flex-1 min-w-[50px] flex flex-col items-center gap-2 group h-full">
                                        <div className="w-full flex-1 flex items-end justify-center h-full">
                                            <div className="w-8 sm:w-10 relative flex flex-col justify-end items-center h-full" title={`${user.name}: ${val} เที่ยว`}>
                                                <div className="w-full rounded-t-sm shadow-sm transition-all flex justify-center items-start pt-1.5" style={{ height: `${heightPct}%`, backgroundColor: bgColor, minHeight: val > 0 ? '24px' : '0' }}>
                                                    <span className="text-white font-bold text-xs drop-shadow-md">{val}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="text-[10px] text-slate-500 dark:text-slate-400 font-bold whitespace-nowrap h-4 truncate w-full text-center" title={user.name}>{user.name}</div>
                                    </div>
                                );
                            })}
                            {userPerformanceData.length === 0 && <div className="w-full h-full flex items-center justify-center text-slate-400 dark:text-slate-500 text-sm">ไม่มีข้อมูลในช่วงเวลานี้</div>}
                        </div>
                        <div className="flex flex-wrap gap-3 mt-4 pt-4 border-t dark:border-slate-700 px-2">
                            <div className="flex items-center gap-1.5 text-[11px] font-medium"><div className="w-2.5 h-2.5 rounded-sm bg-purple-500"></div><span className="text-slate-600 dark:text-slate-300">เรียกรถ (Requester)</span></div>
                            <div className="flex items-center gap-1.5 text-[11px] font-medium"><div className="w-2.5 h-2.5 rounded-sm bg-green-500"></div><span className="text-slate-600 dark:text-slate-300">วิ่งงานสำเร็จ (Driver)</span></div>
                        </div>
                    </Card>
                ),
                waitingVolume: (
                    <Card className="border-amber-100 dark:border-slate-700 flex flex-col h-full">
                        <WidgetHeader id="waitingVolume" title="ปริมาณงานค้างรอรับ แยกตามจุดรับ" icon={Activity} colorClass="text-amber-500" />
                        <div className="h-64 flex items-end justify-around gap-4 overflow-x-auto pb-4 px-2 mt-2 scrollbar-thin scrollbar-thumb-slate-200">
                            {waitingBarData.map((item, index) => {
                                const hPct = Math.min(100, (item.value / maxWaitingBarScale) * 100);
                                const color = getEntityColor(getNormalizedColorName(item.name));
                                return (
                                    <div key={index} className="flex flex-col items-center gap-2 h-full flex-1 min-w-[40px]">
                                        <div className="w-full flex-1 flex items-end justify-center h-full">
                                            <div className="w-8 sm:w-10 relative flex flex-col justify-end items-center h-full group" title={`${item.name}: ${item.value} เที่ยว`}>
                                                <div className="w-full rounded-t-sm shadow-sm transition-all flex justify-center items-start pt-1.5" style={{ height: `${hPct}%`, backgroundColor: color, minHeight: item.value > 0 ? '24px' : '0' }}>
                                                    <span className="text-white font-bold text-xs drop-shadow-md">{item.value}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="text-[11px] text-slate-500 dark:text-slate-400 font-bold whitespace-nowrap h-4 truncate w-full text-center" title={item.name}>{item.name}</div>
                                    </div>
                                );
                            })}
                            {waitingBarData.length === 0 && <div className="w-full h-full flex items-center justify-center text-slate-400 dark:text-slate-500 text-sm">ไม่มีงานค้าง</div>}
                        </div>
                    </Card>
                ),
                pickupLoc: (
                    <Card className="border-blue-100 dark:border-slate-700 flex flex-col h-full">
                        <WidgetHeader id="pickupLoc" title="แยกตามจุดรับ ต้นทาง (สำเร็จ)" icon={MapPin} colorClass="text-blue-500" />
                        <div className="flex-1 relative min-h-[256px]">
                            <div className="absolute inset-0 flex flex-col justify-between py-3 z-0">
                                {pickupVolume.length > 0 ? pickupVolume.map((loc, index) => (
                                    <div key={index} className="flex-1 w-full flex flex-col justify-center px-1">
                                        <div className="flex justify-between text-sm mb-1">
                                            <span className="text-slate-700 dark:text-slate-300 font-medium">{loc.name}</span>
                                        </div>
                                        <div className="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-5 overflow-hidden relative shadow-inner">
                                            <div className="h-full rounded-full transition-all duration-500 flex items-center justify-end pr-2 text-white text-[10px] font-bold" style={{ width: `${Math.max(5, (loc.count / maxVolumePickup) * 100)}%`, backgroundColor: getEntityColor(getNormalizedColorName(loc.name)) }}>
                                                {loc.count > 0 && `${loc.count}`}
                                            </div>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="h-full flex items-center justify-center text-slate-400 dark:text-slate-500">ไม่มีข้อมูลในช่วงเวลานี้</div>
                                )}
                            </div>
                        </div>
                    </Card>
                ),
                dropoffLoc: (
                    <Card className="border-blue-100 dark:border-slate-700 flex flex-col h-full">
                        <WidgetHeader id="dropoffLoc" title="แยกตามจุดส่ง ปลายทาง (สำเร็จ)" icon={MapPin} colorClass="text-rose-500" />
                        <div className="flex-1 relative min-h-[256px]">
                            <div className="absolute inset-0 flex flex-col justify-between py-3 z-0">
                                {locationVolume.length > 0 ? locationVolume.map((loc, index) => (
                                    <div key={index} className="flex-1 w-full flex flex-col justify-center px-1">
                                        <div className="flex justify-between text-sm mb-1">
                                            <span className="text-slate-700 dark:text-slate-300 font-medium">{loc.name}</span>
                                        </div>
                                        <div className="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-5 overflow-hidden relative shadow-inner">
                                            <div className="h-full rounded-full transition-all duration-500 flex items-center justify-end pr-2 text-white text-[10px] font-bold" style={{ width: `${Math.max(5, (loc.count / maxVolumeLoc) * 100)}%`, backgroundColor: getEntityColor(getNormalizedColorName(loc.name)) }}>
                                                {loc.count > 0 && `${loc.count}`}
                                            </div>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="h-full flex items-center justify-center text-slate-400 dark:text-slate-500">ไม่มีข้อมูลในช่วงเวลานี้</div>
                                )}
                            </div>
                        </div>
                    </Card>
                ),
                reqPie: (
                    <Card className="border-blue-100 dark:border-slate-700 h-full flex flex-col">
                        <WidgetHeader id="reqPie" title="สัดส่วนงานตามผู้ร้องขอ" icon={UsersIcon} colorClass="text-purple-500" />
                        <div className="flex-1 pb-6 flex items-center">
                            <SvgPieChart data={requesterData} colors={requesterData.map(d => getEntityColor(getNormalizedColorName(d.name)))} isDonut={false} />
                        </div>
                    </Card>
                ),
                compPie: (
                    <Card className="border-blue-100 dark:border-slate-700 h-full flex flex-col">
                        <WidgetHeader id="compPie" title="สัดส่วนงานสำเร็จ vs ค้าง" icon={TrendingUp} colorClass="text-green-500" />
                        <div className="flex-1 pb-6 flex items-center">
                            <SvgPieChart data={completionData} colors={['#10b981', '#f59e0b']} isDonut={true} />
                        </div>
                    </Card>
                ),
                ongoingTrips: (
                    <Card className="border-blue-100 dark:border-slate-700 flex flex-col h-full">
                        <WidgetHeader id="ongoingTrips" title="สถานะรถกำลังวิ่ง (Ongoing)" icon={Truck} colorClass="text-indigo-500" />
                        <div className="h-64 overflow-y-auto pr-2 space-y-3 scrollbar-thin scrollbar-thumb-slate-200">
                            {activeDriversList.length > 0 ? activeDriversList.map((t, i) => (
                                <div key={i} className="p-3 bg-indigo-50 dark:bg-indigo-900/20 rounded-lg border border-indigo-100 dark:border-indigo-800 flex flex-col sm:flex-row sm:items-center justify-between gap-3 shadow-sm transition-all hover:bg-indigo-100 dark:hover:bg-indigo-900/40">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-indigo-200 dark:bg-indigo-800 p-2 rounded-full mt-0.5"><Truck size={16} className="text-indigo-700 dark:text-indigo-300" /></div>
                                        <div>
                                            <div className="text-sm font-bold text-slate-800 dark:text-slate-100">{t.driverName || 'ไม่ระบุชื่อ'}</div>
                                            <div className="text-[11px] text-slate-500 dark:text-slate-400 mt-1 flex items-center gap-1"><Clock size={12}/> เริ่มเดินทาง: {t.startTime} น.</div>
                                        </div>
                                    </div>
                                    <div className="text-xs text-slate-600 font-medium flex items-center gap-1.5 flex-wrap sm:justify-end">
                                        <span className="px-2 py-1 bg-white dark:bg-slate-800 border dark:border-slate-700 rounded shadow-sm" style={{borderColor: getEntityColor(getNormalizedColorName(t.reqPickup)), color: getEntityColor(getNormalizedColorName(t.reqPickup))}}>{t.reqPickup}</span>
                                        <Navigation size={14} className="text-slate-400" />
                                        <span className="px-2 py-1 bg-white dark:bg-slate-800 border dark:border-slate-700 rounded shadow-sm" style={{borderColor: getEntityColor(getNormalizedColorName(t.reqDropoff)), color: getEntityColor(getNormalizedColorName(t.reqDropoff))}}>{t.reqDropoff}</span>
                                    </div>
                                </div>
                            )) : (
                                <div className="w-full h-full flex items-center justify-center text-slate-400 dark:text-slate-500 text-sm">ไม่มีรถกำลังวิ่งในขณะนี้</div>
                            )}
                        </div>
                    </Card>
                )
            };

            return (
                <div className="space-y-6">
                    <div className="flex gap-2 overflow-x-auto pb-2 border-b border-slate-200 dark:border-slate-700 scrollbar-hide">
                        <button type="button" onClick={() => setActiveTab('stats')} className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap flex items-center gap-2 ${activeTab === 'stats' ? 'bg-slate-800 text-white' : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700'}`}><BarChart2 size={16} /> ภาพรวม</button>
                        <button type="button" onClick={() => setActiveTab('users')} className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap flex items-center gap-2 ${activeTab === 'users' ? 'bg-slate-800 text-white' : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700'}`}><UsersIcon size={16} /> จัดการผู้ใช้งาน</button>
                        <button type="button" onClick={() => setActiveTab('locations')} className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap flex items-center gap-2 ${activeTab === 'locations' ? 'bg-slate-800 text-white' : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700'}`}><MapIcon size={16} /> จัดการสถานที่</button>
                        <button type="button" onClick={() => setActiveTab('requests')} className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap flex items-center gap-2 ${activeTab === 'requests' ? 'bg-slate-800 text-white' : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700'}`}><ListIcon size={16} /> จัดการรายการเรียกรถ</button>
                    </div>

                    {activeTab === 'stats' && (
                        <div className="space-y-6 animate-in fade-in duration-300">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                <h2 className="text-xl font-bold text-slate-800 dark:text-white">Admin Dashboard</h2>
                                <div className="flex gap-2">
                                    <button type="button" onClick={handleExportRequests} className="flex items-center gap-2 text-sm bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 px-3 py-2 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200"><FileText size={16} /> Export Requests</button>
                                    <button type="button" onClick={handleExportTrips} className="flex items-center gap-2 text-sm bg-blue-600 border border-blue-600 text-white px-3 py-2 rounded-lg hover:bg-blue-700 shadow-sm"><Download size={16} /> Export Trips CSV</button>
                                </div>
                            </div>

                            <Card className="bg-slate-50 dark:bg-slate-800/50 border-blue-100 dark:border-slate-700">
                                <div className="flex flex-col md:flex-row gap-4 items-end">
                                    <div className="w-full md:w-auto">
                                        <label className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 block">ช่วงเวลา</label>
                                        <select className="w-full md:w-40 p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={filterType} onChange={(e) => setFilterType(e.target.value)}>
                                            <option value="daily">รายวัน (Daily)</option>
                                            <option value="monthly">รายเดือน (Monthly)</option>
                                            <option value="range">ช่วงเวลา (Custom Range)</option>
                                        </select>
                                    </div>
                                    {filterType === 'daily' && (<div className="w-full md:w-auto"><label className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 block">เลือกวันที่</label><input type="date" className="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} /></div>)}
                                    {filterType === 'monthly' && (<div className="w-full md:w-auto"><label className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 block">เลือกเดือน</label><input type="month" className="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} /></div>)}
                                    {filterType === 'range' && (<div className="flex gap-2 w-full md:w-auto"><div><label className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 block">เริ่มต้น</label><input type="date" className="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={startDate} onChange={(e) => setStartDate(e.target.value)} /></div><div><label className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 block">สิ้นสุด</label><input type="date" className="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={endDate} onChange={(e) => setEndDate(e.target.value)} /></div></div>)}
                                    <div className="w-full md:w-auto">
                                        <label className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 block">คนขับ (Driver)</label>
                                        <select className="w-full md:w-48 p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-700 dark:text-white dark:border-slate-600" value={selectedDriver} onChange={(e) => setSelectedDriver(e.target.value)}><option value="all">คนขับทั้งหมด (All Drivers)</option>{(users||[]).filter(u => u && u.role === 'driver').map(d => (<option key={d.id} value={d.id}>{d.name}</option>))}</select>
                                    </div>
                                </div>
                            </Card>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {[{ label: 'Total (Trips)', val: totalTrips, color: 'text-slate-800 dark:text-white', bg: 'bg-white dark:bg-slate-800' }, { label: 'Finished', val: completedTrips, color: 'text-green-600 dark:text-green-400', bg: 'bg-green-50 dark:bg-green-900/20' }, { label: 'Ongoing', val: activeTrips, color: 'text-blue-600 dark:text-blue-400', bg: 'bg-blue-50 dark:bg-blue-900/20' }, { label: 'Waiting', val: pendingTrips, color: 'text-amber-600 dark:text-amber-400', bg: 'bg-amber-50 dark:bg-amber-900/20' }].map((stat, i) => (
                                    <div key={i} className={`${stat.bg} p-4 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm`}><div className="text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wide font-semibold mb-1">{stat.label}</div><div className={`text-3xl font-bold ${stat.color}`}>{stat.val}</div></div>
                                ))}
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mt-6">
                                {widgetOrder.map((widgetId, index) => {
                                    const colSpanStr = getColSpanClass(widgetSizes[widgetId] || (widgetId === 'ongoingTrips' || widgetId === 'userPerformance' ? 2 : 1));
                                    return (
                                        <div
                                            key={widgetId}
                                            draggable
                                            onDragStart={() => dragItem.current = index}
                                            onDragEnter={() => dragOverItem.current = index}
                                            onDragEnd={handleSort}
                                            onDragOver={(e) => e.preventDefault()}
                                            className={`transition-all duration-300 ${colSpanStr}`}
                                        >
                                            {widgets[widgetId]}
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    )}
                    {activeTab === 'users' && (<AdminUserManagement users={users} setUsers={setUsers} onRefresh={onRefresh} />)}
                    {activeTab === 'locations' && (<AdminLocationManagement locations={locations} setLocations={setLocations} onRefresh={onRefresh} />)}
                    {activeTab === 'requests' && (<AdminRequestManagement requests={requests} setRequests={setRequests} locations={locations} onCreateRequest={onCreateRequest} onRefresh={onRefresh} />)}
                </div>
            );
        };

        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [users, setUsers] = useState([]);
            const [requests, setRequests] = useState([]);
            const [locations, setLocations] = useState([]);
            const [loading, setLoading] = useState(true);
            
            const [showInstallPage, setShowInstallPage] = useState(false);
            const isUpdating = useRef(false);
            
            const [toastMsg, setToastMsg] = useState(null);
            const prevRequestsRef = useRef([]);

            const [darkMode, setDarkMode] = useState(() => {
                const savedTheme = localStorage.getItem('theme');
                return savedTheme === 'dark';
            });

            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }, [darkMode]);

            useEffect(() => {
                if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
                    Notification.requestPermission();
                }
            }, []);

            useEffect(() => {
                const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
                if (!isStandalone) {
                    setShowInstallPage(true);
                }

                const savedUser = localStorage.getItem('transportSysUser');
                if (savedUser) {
                    try { setCurrentUser(JSON.parse(savedUser)); } catch(e){}
                }
                
                fetchData(true);

                const interval = setInterval(() => {
                    fetchData(false); 
                }, 10000); 

                return () => clearInterval(interval);
            }, []);

            const fetchData = (showLoading = true) => {
                if (isUpdating.current) return; 

                if (showLoading) setLoading(true);
                
                callAPI('getInitialData')
                    .then(data => {
                        if (data && !isUpdating.current) { 
                            if(data.users) setUsers(data.users);
                            if(data.requests) {
                                const sortedReqs = data.requests.sort((a, b) => Number(b.id) - Number(a.id));
                                setRequests(sortedReqs);
                            }
                            if(data.locations) setLocations(data.locations);
                        }
                        if (showLoading) setLoading(false);
                    })
                    .catch((error) => {
                        console.error(error);
                        if (showLoading) setLoading(false);
                    });
            };

            useEffect(() => {
                if (currentUser && currentUser.role === 'driver' && requests.length > 0) {
                    const prevReqs = prevRequestsRef.current;
                    
                    const pendingCount = requests.filter(r => r.status === 'pending').length;

                    if (navigator.setAppBadge) {
                        if (pendingCount > 0) {
                            navigator.setAppBadge(pendingCount).catch(e => console.log('Badge error:', e));
                        } else {
                            navigator.clearAppBadge().catch(e => console.log('Badge error:', e));
                        }
                    } else if (navigator.setExperimentalAppBadge) {
                        if (pendingCount > 0) {
                            navigator.setExperimentalAppBadge(pendingCount).catch(console.error);
                        } else {
                            navigator.clearExperimentalAppBadge().catch(console.error);
                        }
                    }
                    
                    if (prevReqs.length > 0) {
                        const newReqs = requests.filter(r => !prevReqs.find(pr => pr.id === r.id));
                        const newPending = newReqs.filter(r => r.status === 'pending');

                        if (newPending.length > 0) {
                            const msg = `🚨 มีงานใหม่เข้า! รับที่: ${newPending[0].pickup}`;
                            
                            setToastMsg(msg);
                            
                            if ('Notification' in window && Notification.permission === 'granted') {
                                if ('serviceWorker' in navigator && navigator.serviceWorker.ready) {
                                    navigator.serviceWorker.ready.then(registration => {
                                        registration.showNotification('TransportSys (งานใหม่)', {
                                            body: msg,
                                            icon: 'https://cdn-icons-png.flaticon.com/512/709/709790.png',
                                            badge: 'https://cdn-icons-png.flaticon.com/512/709/709790.png',
                                            vibrate: [200, 100, 200, 100, 200],
                                            silent: false, 
                                            tag: 'new-job-' + Date.now()
                                        });
                                    });
                                } else {
                                    new Notification('TransportSys (งานใหม่)', {
                                        body: msg,
                                        icon: 'https://cdn-icons-png.flaticon.com/512/709/709790.png'
                                    });
                                }
                            }
                            
                            try {
                                const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                                audio.play().catch(e => console.log('Auto-play blocked'));
                            } catch (e) { console.log('เบราว์เซอร์บล็อกการเล่นเสียงอัตโนมัติ'); }

                            setTimeout(() => setToastMsg(null), 6000);
                        }
                    }
                    prevRequestsRef.current = requests;
                }
            }, [requests, currentUser]);

            const handleLogin = (user) => {
                setCurrentUser(user);
                localStorage.setItem('transportSysUser', JSON.stringify(user));
                
                if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
                    Notification.requestPermission();
                }
            };

            const handleLogout = () => {
                setCurrentUser(null);
                localStorage.removeItem('transportSysUser');
                if ('clearAppBadge' in navigator) {
                    navigator.clearAppBadge().catch(console.error);
                } else if ('clearExperimentalAppBadge' in navigator) {
                    navigator.clearExperimentalAppBadge().catch(console.error);
                }
            };

            const handleCreateRequest = (data) => {
                isUpdating.current = true; 
                const newReqId = Date.now();
                const initialTrips = Array.from({ length: data.tripsNeeded }, (_, i) => ({ 
                    id: `${newReqId}-${i}`, status: 'waiting', startTime: null, endTime: null, driverId: null, driverName: null
                }));
                const newReq = { 
                    id: newReqId, requesterId: currentUser.id, requesterName: currentUser.name, 
                    ...data, 
                    pallets: data.pallets || 0,
                    status: 'pending', tripsCompleted: 0, createdAt: new Date().toISOString(), trips: initialTrips 
                };
                
                const updatedRequests = [newReq, ...requests].sort((a, b) => Number(b.id) - Number(a.id));
                setRequests(updatedRequests); 
                
                callAPI('createRequest', { reqData: newReq })
                    .then((res) => {
                        if (res && res.success === false) alert("⚠️ เกิดข้อผิดพลาดในการบันทึกข้อมูล: " + res.message);
                        isUpdating.current = false;
                        fetchData(false); 
                    })
                    .catch(() => { isUpdating.current = false; });
            };

            const handleAcceptTrip = (reqId, tripId) => {
                isUpdating.current = true;
                
                const now = new Date();
                const timeString = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                
                localStorage.setItem(`accepted_time_${tripId}`, timeString);

                setRequests(requests.map(req => {
                    if (req.id === reqId) {
                        const updatedTrips = req.trips.map(t => t.id === tripId ? { ...t, driverId: currentUser.id, driverName: currentUser.name } : t);
                        let newStatus = req.status;
                        const takenCount = updatedTrips.filter(t => t.driverId).length;
                        if (req.status === 'pending' && takenCount > 0) newStatus = 'assigned';
                        if (takenCount === req.tripsNeeded) newStatus = 'assigned';
                        
                        callAPI('updateTripStatus', { tripId, status: 'waiting', driverId: currentUser.id, driverName: currentUser.name })
                            .then(() => {
                                if (newStatus !== req.status) {
                                    return callAPI('updateRequestStatus', { reqId, status: newStatus });
                                }
                            })
                            .then(() => {
                                isUpdating.current = false; 
                                fetchData(false); 
                            })
                            .catch(() => { isUpdating.current = false; });

                        return { ...req, trips: updatedTrips, status: newStatus };
                    }
                    return req;
                }));
            };

            const handleUpdateTripStatus = (reqId, tripId, action, pallets = 0) => {
                isUpdating.current = true; 

                setRequests(requests.map(req => {
                    if (req.id === reqId) {
                        const now = new Date();
                        const timeString = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                        const dateString = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

                        const updatedTrips = req.trips.map(t => {
                            if (t.id === tripId) {
                                if (action === 'start') return { ...t, status: 'ongoing', startTime: timeString, date: dateString };
                                else if (action === 'end') return { ...t, status: 'finished', endTime: timeString, date: dateString, pallets: Number(pallets) }; 
                            }
                            return t;
                        });
                        
                        const completed = updatedTrips.filter(t => t.status === 'finished').length;
                        const anyOngoing = updatedTrips.some(t => t.status === 'ongoing');
                        let reqStatus = req.status;
                        
                        if (completed >= Number(req.tripsNeeded)) reqStatus = 'completed';
                        else if (anyOngoing || completed > 0) reqStatus = 'in_progress';
                        
                        callAPI('updateTripStatus', { tripId, status: action === 'start' ? 'ongoing' : 'finished', driverId: currentUser.id, driverName: currentUser.name, pallets: Number(pallets) })
                            .then(() => {
                                if (reqStatus !== req.status) {
                                    return callAPI('updateRequestStatus', { reqId, status: reqStatus });
                                }
                            })
                            .then(() => {
                                isUpdating.current = false; 
                                fetchData(false);
                            })
                            .catch(() => { isUpdating.current = false; });

                        return { ...req, trips: updatedTrips, tripsCompleted: completed, status: reqStatus };
                    }
                    return req;
                }));
            };

            if (showInstallPage) {
                return <InstallScreen onSkip={() => setShowInstallPage(false)} />;
            }

            if (loading) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-900 transition-colors duration-200">
                        <div className="w-12 h-12 border-4 border-blue-200 dark:border-blue-900 border-t-blue-600 dark:border-t-blue-400 rounded-full animate-spin mb-4" style={{animation: 'spin 1s linear infinite'}}></div>
                        <h2 className="text-slate-600 dark:text-slate-400 font-medium text-lg">กำลังโหลดข้อมูลจากฐานข้อมูล...</h2>
                    </div>
                );
            }
            
            if (!currentUser) return <LoginScreen users={users} onLogin={handleLogin} refreshData={() => fetchData(true)} />;

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans relative transition-colors duration-200">
                    {toastMsg && (
                        <div className="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 animate-in slide-in-from-top-4 fade-in duration-300 w-[90%] max-w-sm">
                            <div className="bg-blue-600 text-white px-5 py-3 rounded-2xl shadow-xl font-medium flex items-center justify-between gap-3 border border-blue-400">
                                <div className="flex items-center gap-3">
                                    <div className="bg-white/20 p-2 rounded-full">
                                        <Bell className="animate-bounce" size={20} />
                                    </div>
                                    <span className="text-sm leading-tight whitespace-pre-line">{toastMsg}</span>
                                </div>
                                <button type="button" onClick={() => setToastMsg(null)} className="p-1 hover:bg-white/20 rounded-full transition-colors">
                                    <X size={18} />
                                </button>
                            </div>
                        </div>
                    )}

                    <header className="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-10 shadow-sm transition-colors duration-200">
                        <div className="max-w-[1600px] w-full mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-600 p-1.5 rounded-lg"><Truck className="text-white w-5 h-5" /></div>
                                <span className="font-bold text-lg text-slate-800 dark:text-white hidden md:block">TransportSys</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <button type="button" onClick={() => setDarkMode(!darkMode)} className="p-2 text-slate-400 hover:text-amber-500 dark:hover:text-amber-300 bg-slate-100 dark:bg-slate-700 rounded-full transition-colors" title={darkMode ? "สลับเป็นโหมดสว่าง" : "สลับเป็นโหมดมืด"}>
                                    {darkMode ? <Sun size={18} /> : <Moon size={18} />}
                                </button>

                                <div className="flex flex-col items-end mr-2">
                                    <span className="text-sm font-semibold text-slate-700 dark:text-slate-200">{currentUser.name}</span>
                                    <span className="text-xs text-slate-400 uppercase">{currentUser.role}</span>
                                </div>
                                <button type="button" onClick={handleLogout} className="text-slate-400 hover:text-red-500 dark:hover:text-red-400 transition-colors p-2 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-full"><LogOut size={20} /></button>
                            </div>
                        </div>
                    </header>
                    <main className="max-w-[1600px] w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {currentUser.role === 'requester' && (<RequesterDashboard requests={requests} onCreateRequest={handleCreateRequest} currentUserId={currentUser.id} currentUser={currentUser} locations={locations} />)}
                        {currentUser.role === 'driver' && (<DriverDashboard requests={requests} currentUser={currentUser} onAcceptTrip={handleAcceptTrip} onUpdateTripStatus={handleUpdateTripStatus} />)}
                        {currentUser.role === 'admin' && (<AdminDashboard requests={requests} setRequests={setRequests} users={users} setUsers={setUsers} locations={locations} setLocations={setLocations} onCreateRequest={handleCreateRequest} onRefresh={() => fetchData(false)} />)}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
